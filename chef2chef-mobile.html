<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>C2C Stock</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🥩</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --brand: #10b981;
  --danger: #ef4444;
  --warn: #f59e0b;
  --bg: #060e1e;
  --surface: #0d1829;
  --surface2: #111f35;
  --text: #f1f5f9;
  --muted: #475569;
  --border: rgba(255,255,255,0.08);
  --row-alt: rgba(255,255,255,0.018);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);height:100%;height:100dvh;overflow:hidden;overscroll-behavior:none;}

/* ── SYNC BADGE (now like web) ── */
.sync-badge{font-size:9px;font-weight:800;padding:3px 10px;border-radius:20px;background:rgba(16,185,129,0.12);border:1px solid rgba(16,185,129,0.3);color:var(--brand);white-space:nowrap;transition:all 0.3s;}
.sync-badge.syncing{background:rgba(251,191,36,0.12);border-color:rgba(251,191,36,0.3);color:#fbbf24;}
.sync-badge.error{background:rgba(239,68,68,0.12);border-color:rgba(239,68,68,0.3);color:#ef4444;}

/* ── LOADING / NAV / TABLE (unchanged) ── */
#loadScreen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:20px;}
.load-logo{font-size:18px;font-weight:800;letter-spacing:-0.5px;}
.load-logo span{color:var(--brand);}
.load-bar-wrap{width:200px;height:2px;background:rgba(255,255,255,0.07);border-radius:2px;overflow:hidden;}
.load-bar{height:100%;background:var(--brand);width:0%;transition:width 0.2s;}
.load-txt{font-size:10px;font-weight:600;color:var(--muted);}
.nav{height:48px;padding:0 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;}
.nav-logo{font-size:13px;font-weight:800;display:flex;align-items:center;gap:6px;}
.nav-logo span{color:var(--brand);}
.nav-right{display:flex;align-items:center;gap:6px;}
.nav-hist{background:rgba(99,102,241,0.15);border:1px solid rgba(99,102,241,0.3);color:#818cf8;border-radius:20px;padding:4px 10px;font-size:10px;font-weight:700;cursor:pointer;}
.nav-badge{font-size:9px;font-weight:800;color:var(--brand);background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.25);border-radius:20px;padding:2px 8px;}
.tbl-wrap{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;}
.tbl-wrap::-webkit-scrollbar{display:none;}
table{width:100%;border-collapse:collapse;table-layout:fixed;}
/* ... (all your original table, cell, stock-tap, search-bar styles unchanged) ... */

/* ── NUMPAD POPUP (now same as web - draggable) ── */
.numpad-popup{position:fixed;z-index:9000;display:none;flex-direction:column;width:172px;border-radius:20px;background:rgba(255,255,255,0.08);backdrop-filter:blur(40px);border:1px solid rgba(255,255,255,0.22);box-shadow:0 1px 0 rgba(255,255,255,0.3) inset,0 8px 32px rgba(0,0,0,0.25);overflow:hidden;animation:popIn 0.2s cubic-bezier(0.16,1,0.3,1);user-select:none;}
.numpad-popup.open{display:flex;}
@keyframes popIn{from{transform:scale(0.88);opacity:0}to{transform:scale(1);opacity:1}}
.np-drag{padding:6px 7px 5px 9px;cursor:grab;display:flex;align-items:center;justify-content:space-between;gap:4px;border-bottom:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.03);}
.np-drag:active{cursor:grabbing;}
.np-drag-left{display:flex;align-items:center;gap:5px;flex:1;min-width:0;}
.np-dots{display:grid;grid-template-columns:repeat(3,3px);gap:2px;flex-shrink:0;}
.np-dots span{width:3px;height:3px;border-radius:50%;background:rgba(255,255,255,0.25);display:block;}
.np-name{font-size:8px;font-weight:800;color:rgba(255,255,255,0.45);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.np-ok{width:22px;height:22px;border-radius:50%;background:var(--brand);border:none;color:#fff;font-size:11px;font-weight:900;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(16,185,129,0.5);transition:transform 0.1s;}
.np-ok:active{transform:scale(0.88);}
.np-existing{font-size:8px;font-weight:700;color:rgba(255,255,255,0.28);padding:3px 10px 0;text-align:right;}
.np-display{padding:4px 10px 2px;text-align:right;}
.np-val{font-size:22px;font-weight:700;line-height:1;letter-spacing:-0.5px;color:rgba(255,255,255,0.92);word-break:break-all;transition:color 0.1s;}
.np-val.on{color:#fff;text-shadow:0 0 16px rgba(16,185,129,0.5);}
.np-preview{font-size:7px;font-weight:700;color:rgba(251,191,36,0.85);text-align:right;min-height:10px;padding:0 10px 3px;}
.np-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;padding:5px;}
.np-btn{border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.09);border-radius:9px;height:34px;font-size:14px;font-weight:600;color:rgba(255,255,255,0.92);cursor:pointer;transition:background 0.1s,transform 0.07s;}
.np-btn:active{background:rgba(255,255,255,0.2);transform:scale(0.91);}
.np-op{background:rgba(16,185,129,0.13);color:var(--brand);border-color:rgba(16,185,129,0.2);font-weight:800;font-size:13px;}
.np-back{color:rgba(255,255,255,0.4);font-size:12px;}
/* ... rest of your original styles (search, history, etc.) ... */
</style>
</head>
<body>

    <button class="np-btn" onclick="npKey('9')">9</button>
    <button class="np-btn np-op" onclick="npKey('+')">+</button>
    <button class="np-btn" onclick="npKey('4')">4</button>
    <button class="np-btn" onclick="npKey('5')">5</button>
    <button class="np-btn" onclick="npKey('6')">6</button>
    <button class="np-btn np-op" onclick="npKey('-')">−</button>
    <button class="np-btn" onclick="npKey('1')">1</button>
    <button class="np-btn" onclick="npKey('2')">2</button>
    <button class="np-btn" onclick="npKey('3')">3</button>
    <button class="np-btn np-op" onclick="npKey('*')">×</button>
    <button class="np-btn" onclick="npKey('.')">.</button>
    <button class="np-btn" onclick="npKey('0')">0</button>
    <button class="np-btn np-back" onclick="npKey('back')">⌫</button>
    <button class="np-btn np-op" onclick="npKey('/')">÷</button>
  </div>
</div>

}

  if (!popup.contains(e.target) && !e.target.closest('.stock-tap')) {

    document.removeEventListener('click', npOutClick);
