<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>C2C Stock</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🥩</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --brand: #10b981;
  --danger: #ef4444;
  --warn: #f59e0b;
  --bg: #060e1e;
  --surface: #0d1829;
  --surface2: #111f35;
  --text: #f1f5f9;
  --muted: #475569;
  --border: rgba(255,255,255,0.08);
  --row-alt: rgba(255,255,255,0.018);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);height:100%;height:100dvh;overflow:hidden;overscroll-behavior:none;}

/* ── LOADING ── */
#loadScreen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:20px;}
.load-logo{font-size:18px;font-weight:800;letter-spacing:-0.5px;}
.load-logo span{color:var(--brand);}
.load-bar-wrap{width:200px;height:2px;background:rgba(255,255,255,0.07);border-radius:2px;overflow:hidden;}
.load-bar{height:100%;background:var(--brand);width:0%;transition:width 0.2s;}
.load-txt{font-size:10px;font-weight:600;color:var(--muted);}

/* ── NAV ── */
.nav{height:48px;padding:0 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;}
.nav-logo{font-size:13px;font-weight:800;display:flex;align-items:center;gap:6px;}
.nav-logo span{color:var(--brand);}
.nav-right{display:flex;align-items:center;gap:6px;}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--brand);flex-shrink:0;transition:background 0.3s;}
.sync-dot.syncing{background:var(--warn);animation:pulse 1s infinite;}
.sync-dot.error{background:var(--danger);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.nav-hist{background:rgba(99,102,241,0.15);border:1px solid rgba(99,102,241,0.3);color:#818cf8;border-radius:20px;padding:4px 10px;font-size:10px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;}
.nav-badge{font-size:9px;font-weight:800;color:var(--brand);background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.25);border-radius:20px;padding:2px 8px;}

/* ── TABLE WRAP ── */
.tbl-wrap{
  flex:1;
  overflow-y:auto;
  overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior:contain;
}
.tbl-wrap::-webkit-scrollbar{display:none;}

/* ── TABLE ── */
table{width:100%;border-collapse:collapse;table-layout:fixed;}
col.cm1{width:66px;}
col.cm2{width:auto;}
col.cm3{width:82px;}
col.cm4{width:38px;}
col.cm5{width:90px;}

thead th{
  position:sticky;top:0;z-index:40;
  background:var(--surface);
  color:var(--muted);
  padding:8px 6px;
  font-size:8px;font-weight:800;
  text-transform:uppercase;letter-spacing:0.8px;
  text-align:left;
  border-bottom:1px solid var(--border);
}
thead th:first-child{padding-left:14px;}
thead th:last-child{padding-right:14px;}

td{
  padding:11px 6px;
  border-bottom:1px solid var(--border);
  vertical-align:middle;
  overflow:hidden;
}
tr:nth-child(even) td{background:var(--row-alt);}
tr:active td{background:rgba(16,185,129,0.04);}
td:first-child{padding-left:14px;}
td:last-child{padding-right:14px;}

/* ── CELLS ── */
.cell-uid{font-family:monospace;font-size:10px;font-weight:700;color:var(--muted);line-height:1.4;}
.cell-desc-name{font-size:13px;font-weight:700;line-height:1.3;margin-bottom:3px;}
.cell-desc-meta{font-size:9px;font-weight:600;color:var(--muted);line-height:1.5;}
.cell-desc-meta b{color:rgba(255,255,255,0.45);font-weight:700;}
.cell-um{font-size:10px;font-weight:700;color:#818cf8;text-align:center;}
.cell-sup{font-size:10px;font-weight:600;color:rgba(255,255,255,0.55);line-height:1.4;}

/* ── STOCK CELL ── */
.stock-tap{
  display:flex;flex-direction:column;align-items:flex-start;gap:2px;
  cursor:pointer;
  padding:6px 8px;
  border-radius:10px;
  border:1.5px solid rgba(255,255,255,0.07);
  background:rgba(255,255,255,0.02);
  min-height:48px;
  justify-content:center;
  transition:border-color 0.15s,background 0.15s;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
}
.stock-tap:active{border-color:rgba(16,185,129,0.5);background:rgba(16,185,129,0.06);}
.stock-tap.has-val{border-color:rgba(16,185,129,0.2);background:rgba(16,185,129,0.04);}
.stock-qty-big{font-size:20px;font-weight:800;color:var(--brand);line-height:1;}
.stock-empty-ico{font-size:16px;opacity:0.2;line-height:1;}
.qb-badge{font-size:8px;font-weight:700;display:inline-flex;align-items:center;gap:2px;padding:1px 5px;border-radius:20px;line-height:1.4;}
.qb-match{color:#10b981;background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.2);}
.qb-over{color:#60a5fa;background:rgba(96,165,250,0.1);border:1px solid rgba(96,165,250,0.2);}
.qb-under{color:#ef4444;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);}
.qb-none{color:var(--muted);font-size:8px;}

/* ── SEARCH BAR ── */
.search-bar{
  height:56px;
  padding:0 14px;
  display:flex;align-items:center;gap:10px;
  border-top:1px solid var(--border);
  background:var(--surface);
  flex-shrink:0;
}
.search-ico{font-size:14px;opacity:0.35;flex-shrink:0;}
#searchIn{
  flex:1;background:transparent;border:none;
  color:var(--text);font-size:15px;font-weight:600;
  outline:none;font-family:'DM Sans',sans-serif;
  caret-color:var(--brand);
}
#searchIn::placeholder{color:var(--text);opacity:0.3;font-weight:500;}
.search-count{font-size:9px;font-weight:800;color:var(--brand);background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.25);border-radius:20px;padding:3px 9px;white-space:nowrap;flex-shrink:0;}
.search-exit{background:var(--danger);border:none;color:white;width:44px;height:40px;border-radius:10px;font-weight:800;font-size:11px;cursor:pointer;flex-shrink:0;font-family:'DM Sans',sans-serif;}

/* ── LAYOUT ── */
.app{display:flex;flex-direction:column;height:100%;height:100dvh;}

/* ── NUMPAD ── */
.np-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:8000;display:none;backdrop-filter:blur(4px);}
.np-overlay.open{display:block;}
.np-sheet{
  position:fixed;bottom:0;left:0;right:0;
  z-index:8001;
  background:var(--surface);
  border-top:1px solid rgba(255,255,255,0.12);
  border-radius:20px 20px 0 0;
  padding-bottom:env(safe-area-inset-bottom,0px);
  transform:translateY(100%);
  transition:transform 0.3s cubic-bezier(0.16,1,0.3,1);
}
.np-sheet.open{transform:translateY(0);}
.np-handle{width:36px;height:4px;background:rgba(255,255,255,0.15);border-radius:2px;margin:12px auto 0;}
.np-item-name{font-size:11px;font-weight:700;color:var(--muted);padding:8px 20px 0;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.np-current{text-align:center;padding:4px 20px;font-size:9px;font-weight:700;color:var(--muted);}
.np-current span{color:var(--brand);}
.np-display{text-align:center;padding:4px 20px 0;}
.np-value{font-size:36px;font-weight:800;line-height:1;color:rgba(255,255,255,0.3);letter-spacing:-1px;transition:color 0.1s;}
.np-value.on{color:#fff;}
.np-preview{text-align:center;font-size:10px;font-weight:700;color:rgba(251,191,36,0.8);min-height:16px;padding:3px 20px;}
.np-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:8px 12px 12px;}
.np-btn{
  height:52px;border-radius:12px;
  border:1px solid rgba(255,255,255,0.07);
  background:rgba(255,255,255,0.06);
  color:rgba(255,255,255,0.9);
  font-size:18px;font-weight:600;
  cursor:pointer;font-family:'DM Sans',sans-serif;
  transition:background 0.08s,transform 0.06s;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
}
.np-btn:active{background:rgba(255,255,255,0.16);transform:scale(0.93);}
.np-op{background:rgba(16,185,129,0.12);color:var(--brand);border-color:rgba(16,185,129,0.2);font-weight:800;}
.np-op:active{background:rgba(16,185,129,0.25);}
.np-back{color:rgba(255,255,255,0.35);}
.np-confirm{
  margin:0 12px 8px;height:52px;width:calc(100% - 24px);
  border-radius:14px;border:none;
  background:var(--brand);color:#fff;
  font-size:16px;font-weight:800;
  cursor:pointer;font-family:'DM Sans',sans-serif;
  box-shadow:0 4px 20px rgba(16,185,129,0.35);
  transition:transform 0.1s,box-shadow 0.1s;
  -webkit-tap-highlight-color:transparent;
}
.np-confirm:active{transform:scale(0.97);box-shadow:0 2px 10px rgba(16,185,129,0.25);}

/* ── HISTORY DRAWER ── */
.hist-overlay{position:fixed;inset:0;z-index:7000;display:none;}
.hist-overlay.open{display:block;}
.hist-drawer{position:fixed;top:0;right:-100%;width:92%;max-width:380px;height:100%;background:var(--bg);border-left:1px solid var(--border);z-index:7001;display:flex;flex-direction:column;transition:right 0.3s cubic-bezier(0.16,1,0.3,1);box-shadow:-8px 0 32px rgba(0,0,0,0.4);}
.hist-drawer.open{right:0;}
.hist-head{padding:16px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface);}
.hist-title{font-size:13px;font-weight:800;}
.hist-close{background:rgba(255,255,255,0.07);border:1px solid var(--border);color:var(--text);font-size:14px;cursor:pointer;width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;}
.hist-body{flex:1;overflow-y:auto;padding:8px;-webkit-overflow-scrolling:touch;}
.hist-body::-webkit-scrollbar{display:none;}
.hist-row{padding:10px 12px;border-radius:10px;margin-bottom:6px;border:1px solid var(--border);background:var(--surface);}
.hist-top{display:flex;justify-content:space-between;margin-bottom:3px;}
.hist-uid{font-family:monospace;font-size:9px;color:var(--muted);font-weight:700;}
.hist-ts{font-size:8px;color:var(--muted);}
.hist-desc{font-size:11px;font-weight:700;margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hist-vals{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;flex-wrap:wrap;}
.hist-old{color:#64748b;}
.hist-new{color:var(--brand);font-size:14px;}
.hist-change{font-size:10px;font-weight:800;padding:1px 6px;border-radius:20px;}
.hist-change.pos{background:rgba(16,185,129,0.12);color:#10b981;border:1px solid rgba(16,185,129,0.25);}
.hist-change.neg{background:rgba(239,68,68,0.12);color:#ef4444;border:1px solid rgba(239,68,68,0.25);}
.hist-src{font-size:8px;font-weight:800;padding:1px 5px;border-radius:20px;}
.hist-src.web{background:rgba(59,130,246,0.12);color:#60a5fa;border:1px solid rgba(59,130,246,0.25);}
.hist-src.sheet{background:rgba(251,191,36,0.12);color:#fbbf24;border:1px solid rgba(251,191,36,0.25);}
.hist-empty{text-align:center;padding:40px;color:var(--muted);font-size:12px;font-weight:700;}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loadScreen">
  <div class="load-logo">CHEF2CHEF <span>STOCK</span></div>
  <div class="load-bar-wrap"><div class="load-bar" id="loadBar"></div></div>
  <div class="load-txt" id="loadTxt">Connecting…</div>
</div>

<!-- APP -->
<div class="app" id="appWrap" style="display:none">
  <!-- NAV -->
  <nav class="nav">
    <div class="nav-logo"><span style="font-size:20px">🥩</span> CHEF2CHEF <span>STOCK</span></div>
    <div class="nav-right">
      <div class="sync-dot" id="syncDot"></div>
      <button class="nav-hist" onclick="openHistory()">📋</button>
    </div>
  </nav>

  <!-- TABLE -->
  <div class="tbl-wrap" id="tblWrap">
    <table>
      <colgroup><col class="cm1"><col class="cm2"><col class="cm3"><col class="cm4"><col class="cm5"></colgroup>
      <thead><tr>
        <th>CODE</th>
        <th>ITEM</th>
        <th>STOCK</th>
        <th>U/M</th>
        <th>SUPPLIER</th>
      </tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <!-- SEARCH BAR -->
  <div class="search-bar">
    <span class="search-ico">🔍</span>
    <input id="searchIn" type="text" placeholder="Search item, UID, supplier…" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    <span class="search-count" id="barCount">—</span>
    <button class="search-exit" onclick="location.reload()">EXIT</button>
  </div>
</div>

<!-- NUMPAD BOTTOM SHEET -->
<div class="np-overlay" id="npOverlay" onclick="closeNp()"></div>
<div class="np-sheet" id="npSheet">
  <div class="np-handle"></div>
  <div class="np-item-name" id="npName">—</div>
  <div class="np-current" id="npCurrent"></div>
  <div class="np-display"><div class="np-value" id="npVal">0</div></div>
  <div class="np-preview" id="npPreview"></div>
  <div class="np-grid">
    <button class="np-btn" onclick="npKey('7')">7</button>
    <button class="np-btn" onclick="npKey('8')">8</button>
    <button class="np-btn" onclick="npKey('9')">9</button>
    <button class="np-btn np-op" onclick="npKey('+')">+</button>
    <button class="np-btn" onclick="npKey('4')">4</button>
    <button class="np-btn" onclick="npKey('5')">5</button>
    <button class="np-btn" onclick="npKey('6')">6</button>
    <button class="np-btn np-op" onclick="npKey('-')">−</button>
    <button class="np-btn" onclick="npKey('1')">1</button>
    <button class="np-btn" onclick="npKey('2')">2</button>
    <button class="np-btn" onclick="npKey('3')">3</button>
    <button class="np-btn np-op" onclick="npKey('*')">×</button>
    <button class="np-btn" onclick="npKey('.')">.</button>
    <button class="np-btn" onclick="npKey('0')">0</button>
    <button class="np-btn np-back" onclick="npKey('back')">⌫</button>
    <button class="np-btn np-op" onclick="npKey('/')">÷</button>
  </div>
  <button class="np-confirm" id="npConfirmBtn" onclick="npConfirm()">CONFIRM</button>
</div>

<!-- HISTORY DRAWER -->
<div class="hist-overlay" id="histOverlay" onclick="closeHistory()"></div>
<div class="hist-drawer" id="histDrawer">
  <div class="hist-head">
    <span class="hist-title">📋 STOCK HISTORY</span>
    <button class="hist-close" onclick="closeHistory()">✕</button>
  </div>
  <div class="hist-body" id="histBody"><div class="hist-empty">Loading…</div></div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>
<script>
// ── FIREBASE ──────────────────────────────────────────────
firebase.initializeApp({
  apiKey:"AIzaSyAWI0Sd4hY_6X_odo2LCamwbQPSdLEjH1w",
  authDomain:"chef2chef-stock.firebaseapp.com",
  databaseURL:"https://chef2chef-stock-default-rtdb.firebaseio.com",
  projectId:"chef2chef-stock",
  storageBucket:"chef2chef-stock.firebasestorage.app",
  messagingSenderId:"510949862594",
  appId:"1:510949862594:web:2bae9e49826221e5a69f5b"
});
const db = firebase.database();

// ── CONFIG ────────────────────────────────────────────────
const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbxMLov_17GxueYsralH8T1NkIWJ_bPcw8U20WNlMoCCvQ1pztkg6B5-eONZdPt1OHl3/exec';
const PAGE_SIZE  = 7;

let ITEMS = [], historyLog = [];
const stockData = {}, formulaData = {};
let fbListening = false;
let lastHistoryTs = localStorage.getItem('c2c_last_hts') || '';

// ── SYNC BADGE ────────────────────────────────────────────
function setSync(state) {
  const d = document.getElementById('syncDot');
  if (!d) return;
  d.className = 'sync-dot' + (state==='ok' ? '' : ' '+state);
}

// ── STORAGE ───────────────────────────────────────────────
function saveLocal(){try{localStorage.setItem('c2c_stock',JSON.stringify({s:stockData,f:formulaData}));}catch(e){}}
function loadLocal(){try{const d=JSON.parse(localStorage.getItem('c2c_stock')||'{}');if(d.s)Object.assign(stockData,d.s);if(d.f)Object.assign(formulaData,d.f);}catch(e){}}
function saveHistory(){try{localStorage.setItem('c2c_history',JSON.stringify(historyLog.slice(0,500)));}catch(e){}}
function loadHistory(){try{historyLog=JSON.parse(localStorage.getItem('c2c_history')||'[]');}catch(e){}}

// ── HISTORY ───────────────────────────────────────────────
function openHistory(){
  document.getElementById('histDrawer').classList.add('open');
  document.getElementById('histOverlay').classList.add('open');
  fetchHistory();
}
function closeHistory(){
  document.getElementById('histDrawer').classList.remove('open');
  document.getElementById('histOverlay').classList.remove('open');
}
function fetchHistory(){
  document.getElementById('histBody').innerHTML='<div class="hist-empty">Loading…</div>';
  fetch(SHEETS_URL+'?action=getHistory&_t='+Date.now(),{cache:'no-store',redirect:'follow'})
    .then(r=>r.json()).then(d=>{
      if(d.ok&&d.history){
        d.history.forEach(e=>{if(!historyLog.some(l=>l.ts===e.ts&&l.uid===e.uid))historyLog.unshift(e);});
        if(historyLog.length>500)historyLog=historyLog.slice(0,500);
        saveHistory();renderHistory();
      }else document.getElementById('histBody').innerHTML='<div class="hist-empty">No history yet</div>';
    }).catch(()=>{document.getElementById('histBody').innerHTML='<div class="hist-empty">Could not load</div>';});
}
function renderHistory(){
  const body=document.getElementById('histBody');
  if(!historyLog.length){body.innerHTML='<div class="hist-empty">No history yet</div>';return;}
  body.innerHTML=historyLog.map(e=>{
    const added=String(e.added||'');
    const isPos=!added.startsWith('-');
    const src=e.source==='sheet'?'📊 SHEET':'🌐 WEB';
    const srcCls=e.source==='sheet'?'sheet':'web';
    return`<div class="hist-row">
      <div class="hist-top"><span class="hist-uid">${xe(e.uid)}</span><span class="hist-ts">${xe(e.ts)}</span></div>
      <div class="hist-desc">${xe(e.desc)}</div>
      <div class="hist-vals">
        <span class="hist-old">${e.oldVal}</span>
        <span style="color:var(--muted);font-size:9px">→</span>
        <span class="hist-new">${e.newVal}</span>
        <span class="hist-change ${isPos?'pos':'neg'}">${added}</span>
        <span class="hist-src ${srcCls}">${src}</span>
      </div>
    </div>`;
  }).join('');
}
function addLocalHistory(uid,oldVal,newVal,added,formula,source){
  const item=ITEMS.find(r=>r.id===uid);
  const ts=new Date().toISOString().replace('T',' ').slice(0,19);
  const addStr=added>=0?'+'+parseFloat(added.toFixed(4)):String(parseFloat(added.toFixed(4)));
  historyLog.unshift({ts,uid,desc:item?item.desc:uid,oldVal,newVal,added:addStr,formula:formula||'',source:source||'website'});
  if(historyLog.length>500)historyLog.pop();
  saveHistory();
  if(document.getElementById('histDrawer').classList.contains('open'))renderHistory();
}

// ── FIREBASE WRITE ─────────────────────────────────────────
function fbWrite(uid,qty,formula,added){
  const safeKey=uid.replace(/[.#$[\]]/g,'_');
  const p={qty,formula:formula||String(qty),ts:Date.now()};
  if(added!==undefined)p.added=added;
  db.ref('stock/'+safeKey).set(p);
}

// ── FIREBASE LISTENER ──────────────────────────────────────
function startFirebaseListener(){
  if(fbListening)return;
  fbListening=true;
  db.ref('stock').on('value',snap=>{
    const data=snap.val();if(!data)return;
    let changed=false;
    Object.entries(data).forEach(([safeKey,val])=>{
      const item=ITEMS.find(r=>r.id.replace(/[.#$[\]]/g,'_')===safeKey);if(!item)return;
      const uid=item.id,newQty=parseFloat(val.qty)||0,newForm=String(val.formula||newQty);
      const localQty=stockData[uid]||0;
      if(newQty!==localQty||newForm!==(formulaData[uid]||'')){
        const added=val.added!==undefined?val.added:(newQty-localQty);
        const old=localQty;
        stockData[uid]=newQty;formulaData[uid]=newForm;
        updateCell(uid);
        addLocalHistory(uid,old,newQty,added,newForm,'web');
        changed=true;
      }
    });
    if(changed){saveLocal();setSync('ok');}
  });
}

// ── SHEET POLL ─────────────────────────────────────────────
function startSheetPoll(){
  setInterval(()=>{
    fetch(SHEETS_URL+'?action=getHistory&_t='+Date.now()+Math.random(),{cache:'no-store',redirect:'follow'})
      .then(r=>r.json()).then(d=>{
        if(!d.ok||!d.history)return;
        const newEntries=d.history.filter(e=>e.ts>lastHistoryTs).reverse();
        if(!newEntries.length)return;
        newEntries.forEach(e=>{
          const old=stockData[e.uid]||0;
          if(parseFloat(e.newVal)!==old||e.formula!==(formulaData[e.uid]||'')){
            stockData[e.uid]=parseFloat(e.newVal)||0;
            formulaData[e.uid]=e.formula||String(e.newVal);
            fbWrite(e.uid,stockData[e.uid],formulaData[e.uid],parseFloat(e.added));
            updateCell(e.uid);
            addLocalHistory(e.uid,old,parseFloat(e.newVal),parseFloat(e.added),e.formula,e.source);
          }
        });
        lastHistoryTs=d.history[0].ts;
        localStorage.setItem('c2c_last_hts',lastHistoryTs);
        saveLocal();setSync('ok');
      }).catch(()=>{});
  },5000);
}

// ── WRITE ──────────────────────────────────────────────────
let retryQ={};
function sendAdd(uid,addQty){
  const old=stockData[uid]||0,newVal=parseFloat((old+addQty).toFixed(4));
  const oldForm=formulaData[uid]||String(old);
  const newForm=old===0?String(addQty):oldForm+(addQty>=0?'+':'')+addQty;
  stockData[uid]=newVal;formulaData[uid]=newForm;
  saveLocal();updateCell(uid);
  addLocalHistory(uid,old,newVal,addQty,newForm,'website');
  setSync('syncing');fbWrite(uid,newVal,newForm,addQty);
  fetch(SHEETS_URL+'?uid='+encodeURIComponent(uid)+'&add='+encodeURIComponent(addQty)+'&source=website&_t='+Date.now()+Math.random(),{cache:'no-store',redirect:'follow'})
    .then(r=>r.json()).then(d=>{
      if(d.ok){stockData[uid]=d.newVal;formulaData[uid]=d.formula;fbWrite(uid,d.newVal,d.formula,parseFloat(d.added||addQty));saveLocal();updateCell(uid);delete retryQ[uid];setSync('ok');}
      else{retryQ[uid]={mode:'add',val:addQty};setSync('syncing');}
    }).catch(()=>{retryQ[uid]={mode:'add',val:addQty};setSync('syncing');});
}
setInterval(()=>{
  Object.entries(retryQ).forEach(([uid,op])=>{
    const p=op.mode==='add'?'&add='+encodeURIComponent(op.val):'&set='+encodeURIComponent(op.val);
    fetch(SHEETS_URL+'?uid='+encodeURIComponent(uid)+p+'&source=website&_t='+Date.now()+Math.random(),{cache:'no-store',redirect:'follow'})
      .then(r=>r.json()).then(d=>{if(d.ok){delete retryQ[uid];if(!Object.keys(retryQ).length)setSync('ok');}}).catch(()=>{});
  });
},3000);

// ── CELL UPDATE ────────────────────────────────────────────
function updateCell(id){
  const sid=id.replace(/[^a-zA-Z0-9_-]/g,'_');
  const el=document.getElementById('sc-'+sid);if(!el)return;
  el.innerHTML=stockCellInner(id);
  el.className='stock-tap'+(( stockData[id]||0)>0?' has-val':'');
}

// ── RENDER ─────────────────────────────────────────────────
let displayItems=[];
function xe(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function stockCellInner(id){
  const qty=stockData[id]||0;
  const item=ITEMS.find(r=>r.id===id);
  const qb=item?item.qb:0;
  if(qty>0){
    const disp=qty%1===0?qty:qty.toFixed(2);
    let qbHtml='';
    if(qb>0){
      const diff=qty-qb;
      const sign=diff>0?'+':'';
      const cls=diff===0?'qb-match':diff>0?'qb-over':'qb-under';
      const label=diff===0?`QB✓`:`QB${sign}${diff%1===0?diff:diff.toFixed(1)}`;
      qbHtml=`<span class="qb-badge ${cls}">${label}</span>`;
    }else{
      qbHtml=`<span class="qb-none">QB—</span>`;
    }
    return`<span class="stock-qty-big">${disp}</span>${qbHtml}`;
  }
  return`<span class="stock-empty-ico">＋</span>`;
}

function renderTable(){
  document.getElementById('tbody').innerHTML=displayItems.map(r=>{
    const sid=r.id.replace(/[^a-zA-Z0-9_-]/g,'_');
    const hasVal=(stockData[r.id]||0)>0;
    const meta=[
      r.pack?`<b>${xe(r.pack)}</b>`:'',
      r.brand?xe(r.brand):'',
      r.origin?xe(r.origin):''
    ].filter(Boolean).join(' · ');
    return`<tr>
      <td class="cell-uid">${xe(r.id)}</td>
      <td>
        <div class="cell-desc-name">${xe(r.desc)}</div>
        ${meta?`<div class="cell-desc-meta">${meta}</div>`:''}
      </td>
      <td>
        <div class="stock-tap${hasVal?' has-val':''}" id="sc-${sid}" onclick="openNp('${r.id}')">
          ${stockCellInner(r.id)}
        </div>
      </td>
      <td class="cell-um">${xe(r.um)}</td>
      <td class="cell-sup">${xe(r.sup)}</td>
    </tr>`;
  }).join('');
}

// ── NUMPAD ─────────────────────────────────────────────────
let np={val:'0',id:null,um:''};

function openNp(id){
  const item=ITEMS.find(r=>r.id===id);if(!item)return;
  np.id=id;np.um=item.um;np.val='0';
  document.getElementById('npName').textContent=item.desc;
  const ex=stockData[id]||0;
  document.getElementById('npCurrent').innerHTML=ex>0?`Current: <span>${ex} ${item.um}</span>`:'No stock yet';
  npDraw();
  document.getElementById('npOverlay').classList.add('open');
  document.getElementById('npSheet').classList.add('open');
  // prevent body scroll
  document.body.style.overflow='hidden';
}
function closeNp(){
  document.getElementById('npOverlay').classList.remove('open');
  document.getElementById('npSheet').classList.remove('open');
  document.body.style.overflow='';
}
function npDraw(){
  const el=document.getElementById('npVal');
  el.textContent=np.val;el.className='np-value'+(np.val!=='0'?' on':'');
  const pv=document.getElementById('npPreview');
  const ex=stockData[np.id]||0;
  if(!np.val||np.val==='0'){pv.textContent=ex>0?'Will add to '+ex+' '+np.um:'First entry';return;}
  try{
    let addQty,newTotal;
    if(/^[-*\/]/.test(np.val)){newTotal=parseFloat(Function('return ('+ex+np.val+')')().toFixed(4));addQty=parseFloat((newTotal-ex).toFixed(4));}
    else{addQty=parseFloat(Function('return ('+np.val+')')().toFixed(4));newTotal=parseFloat((ex+addQty).toFixed(4));}
    newTotal=Math.max(0,newTotal);addQty=parseFloat((newTotal-ex).toFixed(4));
    pv.textContent=ex+' '+(addQty>=0?'+':'')+addQty+' = '+newTotal+' '+np.um;
  }catch(e){pv.textContent='...';}
}
function npKey(k){
  const ops=['+','-','*','/'];
  if(k==='back'){np.val=np.val.length>1?np.val.slice(0,-1):'0';}
  else if(ops.includes(k)){
    if(np.val==='0'&&k!=='+')np.val=k;
    else if(ops.includes(np.val.slice(-1)))np.val=np.val.slice(0,-1)+k;
    else np.val+=k;
  }else if(k==='.'){
    const parts=np.val.split(/[-*\/]/);
    if(!parts[parts.length-1].includes('.'))np.val+='.';
  }else{np.val=(np.val==='0')?k:np.val+k;}
  npDraw();
}
function npConfirm(){
  const ex=stockData[np.id]||0,v=np.val;
  if(!v||v==='0'){closeNp();return;}
  let addQty,newTotal;
  try{
    if(/^[-*\/]/.test(v)){newTotal=Math.max(0,parseFloat(Function('return ('+ex+v+')')().toFixed(4)));addQty=parseFloat((newTotal-ex).toFixed(4));}
    else{addQty=parseFloat(Function('return ('+v+')')().toFixed(4));newTotal=Math.max(0,parseFloat((ex+addQty).toFixed(4)));addQty=parseFloat((newTotal-ex).toFixed(4));}
  }catch(e){addQty=0;newTotal=ex;}
  if(navigator.vibrate)navigator.vibrate(40);
  if(addQty!==0)sendAdd(np.id,addQty);
  closeNp();
}

// ── SEARCH ─────────────────────────────────────────────────
let sT;
document.getElementById('searchIn').addEventListener('input',e=>{
  clearTimeout(sT);
  sT=setTimeout(()=>{
    const q=e.target.value.toLowerCase().trim();
    const terms=q.split(/\s+/).filter(Boolean);
    let filtered=q?ITEMS.filter(r=>{
      const t=(r.id+' '+r.desc+' '+r.sup+' '+r.cat+' '+r.brand+' '+r.origin).toLowerCase();
      return terms.every(w=>t.includes(w));
    }):ITEMS;
    const total=filtered.length;
    displayItems=filtered.slice(0,PAGE_SIZE);
    document.getElementById('barCount').textContent=q?(total>PAGE_SIZE?`${PAGE_SIZE}/${total.toLocaleString()}`:total.toLocaleString()):PAGE_SIZE+'/'+ITEMS.length.toLocaleString();
    document.getElementById('tblWrap').scrollTop=0;
    renderTable();
  },150);
});

// ── BOOT ───────────────────────────────────────────────────
window.addEventListener('load',()=>{
  loadLocal();loadHistory();
  let p=0,attempt=0;
  const bar=document.getElementById('loadBar'),txt=document.getElementById('loadTxt');
  const iv=setInterval(()=>{p=Math.min(p+Math.random()*12,88);bar.style.width=p+'%';},60);

  function finishLoad(){
    clearInterval(iv);bar.style.width='100%';
    displayItems=ITEMS.slice(0,PAGE_SIZE);
    txt.textContent=ITEMS.length.toLocaleString()+' items ✓';
    document.getElementById('barCount').textContent=PAGE_SIZE+'/'+ITEMS.length.toLocaleString();
    setSync('ok');
    setTimeout(()=>{
      renderTable();
      document.getElementById('loadScreen').style.display='none';
      document.getElementById('appWrap').style.display='flex';
      startFirebaseListener();
      startSheetPoll();
      fetch(SHEETS_URL+'?action=getHistory&_t='+Date.now(),{redirect:'follow'})
        .then(r=>r.json()).then(d=>{
          if(d.ok&&d.history.length){lastHistoryTs=d.history[0].ts;localStorage.setItem('c2c_last_hts',lastHistoryTs);}
        }).catch(()=>{});
    },200);
  }

  function fetchFromSheet(){
    attempt++;
    txt.textContent=attempt>1?'Retrying ('+attempt+'/3)…':'Connecting…';
    fetch(SHEETS_URL+'?action=getAll&_t='+Date.now()+Math.random(),{cache:'no-store',redirect:'follow'})
      .then(r=>{if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
      .then(d=>{
        if(!d.ok||!d.items)throw new Error(d.error||'No data');
        ITEMS=d.items;
        ITEMS.forEach(item=>{
          stockData[item.id]=parseFloat(item.stock)||0;
          if(item.formula)formulaData[item.id]=item.formula;
        });
        saveLocal();
        try{localStorage.setItem('c2c_items',JSON.stringify(ITEMS));}catch(e){}
        db.ref('stock').once('value').then(snap=>{
          const fb=snap.val();
          if(fb){
            Object.entries(fb).forEach(([safeKey,val])=>{
              const item=ITEMS.find(r=>r.id.replace(/[.#$[\]]/g,'_')===safeKey);
              if(!item)return;
              stockData[item.id]=parseFloat(val.qty)||0;
              formulaData[item.id]=String(val.formula||val.qty||0);
            });
            saveLocal();
          }
          finishLoad();
        }).catch(()=>finishLoad());
      })
      .catch(err=>{
        if(attempt<3){txt.textContent='Retrying…';setTimeout(fetchFromSheet,2000);}
        else{
          clearInterval(iv);bar.style.width='100%';
          txt.textContent='✕ Failed — tap to retry';
          txt.style.cursor='pointer';
          txt.onclick=()=>{attempt=0;p=0;bar.style.width='0%';txt.style.cursor='';fetchFromSheet();};
          setSync('error');
        }
      });
  }

  // Cache-first boot
  const cached=localStorage.getItem('c2c_items');
  if(cached){
    try{
      ITEMS=JSON.parse(cached);
      if(ITEMS&&ITEMS.length>100){
        txt.textContent='Loaded from cache ⚡';
        finishLoad();
        setTimeout(fetchFromSheet,2000);
        return;
      }
    }catch(e){ITEMS=[];}
  }
  fetchFromSheet();
});
</script>
