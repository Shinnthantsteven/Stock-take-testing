<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>C2C Mobile v6</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --brand: #10b981; --bg: #020617; --card: #0f172a; --text: #f1f5f9; --border: rgba(255,255,255,0.08); }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* HEADER */
        .nav { padding: 12px 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: 800; font-size: 13px; color: var(--brand); letter-spacing: 0.5px; }
        #status { font-size: 9px; font-weight: 800; color: #64748b; }

        /* SEARCH BAR */
        .search-wrap { padding: 10px; background: #070e1e; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); }
        #searchIn { flex: 1; background: transparent; border: none; color: white; font-size: 16px; font-weight: 700; pointer-events: none; }
        .res-count { font-size: 10px; font-weight: 800; color: var(--brand); background: rgba(16,185,129,0.1); padding: 2px 6px; border-radius: 4px; }

        /* LIST AREA */
        .list-container { flex: 1; overflow-y: auto; padding: 8px; }
        .card { 
            background: var(--card); border: 1px solid var(--border); border-radius: 12px; 
            padding: 12px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px;
        }
        .info { flex: 1; min-width: 0; }
        .uid { font-size: 9px; color: #475569; font-weight: 700; font-family: monospace; }
        .desc { font-size: 14px; font-weight: 700; margin: 1px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #fff; }
        .meta { font-size: 10px; color: #818cf8; font-weight: 600; opacity: 0.8; }

        .qb-box { text-align: center; background: rgba(255,255,255,0.03); padding: 5px; border-radius: 8px; min-width: 58px; border: 1px solid rgba(255,255,255,0.05); }
        .qb-lab { font-size: 7px; color: #64748b; font-weight: 800; text-transform: uppercase; }
        .qb-val { font-size: 12px; font-weight: 700; color: #cbd5e1; }

        .stock-trigger { 
            width: 65px; height: 42px; background: rgba(16,185,129,0.05); border: 1.5px dashed var(--brand); 
            border-radius: 10px; display: flex; align-items: center; justify-content: center;
            font-size: 17px; font-weight: 800; color: var(--brand);
        }

        /* 3-LINE KEYBOARD */
        .kb-area { background: #0f172a; padding: 6px; border-top: 1px solid var(--border); }
        .kb-row { display: flex; justify-content: center; gap: 4px; margin-bottom: 5px; }
        .key { background: #334155; border: none; color: white; border-radius: 5px; flex: 1; height: 38px; font-size: 14px; font-weight: 700; }
        .key:active { background: var(--brand); }
        .key-del { flex: 1.5; background: #ef4444; }
        .key-spc { flex: 4; background: #475569; }

        /* NUMPAD OVERLAY */
        .numpad-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; display: none; flex-direction: column; justify-content: flex-end; }
        .numpad-content { background: #0d1829; border-top: 3px solid var(--brand); padding: 15px; border-radius: 20px 20px 0 0; }
        .np-item-name { font-size: 12px; font-weight: 800; margin-bottom: 10px; color: #818cf8; text-transform: uppercase; }
        .np-display { background: #020617; padding: 12px; border-radius: 10px; text-align: right; margin-bottom: 15px; border: 1px solid var(--border); }
        .np-formula { font-size: 13px; color: #64748b; font-family: monospace; min-height: 15px; }
        .np-total { font-size: 28px; font-weight: 800; color: var(--brand); }
        .np-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .np-btn { height: 52px; border-radius: 10px; border: none; background: #1e293b; color: white; font-size: 20px; font-weight: 700; }
        .np-op { background: #334155; color: var(--brand); }
        .np-ok { background: var(--brand); grid-column: span 2; }
    </style>
</head>
<body>

<div class="nav">
    <div class="logo">CHEF2CHEF <span style="opacity:0.5">|</span> MOBILE</div>
    <div id="status">INIT...</div>
</div>

<div class="search-wrap">
    <input type="text" id="searchIn" placeholder="Tap keyboard to search...">
    <div class="res-count" id="resCount">0</div>
</div>

<div class="list-container" id="itemList"></div>

<div class="kb-area">
    <div class="kb-row" id="kb1"></div>
    <div class="kb-row" id="kb2"></div>
    <div class="kb-row" id="kb3"></div>
</div>

<div class="numpad-overlay" id="npOverlay">
    <div class="numpad-content">
        <div id="npName" class="np-item-name">...</div>
        <div class="np-display">
            <div class="np-formula" id="npForm">0</div>
            <div class="np-total" id="npRes">0</div>
        </div>
        <div class="np-grid">
            <button class="np-btn" onclick="npKey('7')">7</button><button class="np-btn" onclick="npKey('8')">8</button><button class="np-btn" onclick="npKey('9')">9</button><button class="np-btn np-op" onclick="npKey('/')">÷</button>
            <button class="np-btn" onclick="npKey('4')">4</button><button class="np-btn" onclick="npKey('5')">5</button><button class="np-btn" onclick="npKey('6')">6</button><button class="np-btn np-op" onclick="npKey('*')">×</button>
            <button class="np-btn" onclick="npKey('1')">1</button><button class="np-btn" onclick="npKey('2')">2</button><button class="np-btn" onclick="npKey('3')">3</button><button class="np-btn np-op" onclick="npKey('-')">-</button>
            <button class="np-btn" onclick="npKey('0')">0</button><button class="np-btn" onclick="npKey('.')">.</button><button class="np-btn" onclick="npKey('+')">+</button><button class="np-btn np-op" onclick="npKey('C')" style="color:#ef4444">C</button>
            <button class="np-btn" style="grid-column: span 2; background:#334155;" onclick="closeNp()">CANCEL</button>
            <button class="np-btn np-ok" onclick="confirmStock()">CONFIRM</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>

<script>
    // --- CONFIG ---
    const firebaseConfig = { apiKey: "AIzaSyAWI0Sd4hY_6X_odo2LCamwbQPSdLEjH1w", authDomain: "chef2chef-stock.firebaseapp.com", databaseURL: "https://chef2chef-stock-default-rtdb.firebaseio.com", projectId: "chef2chef-stock" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const API = 'https://script.google.com/macros/s/AKfycbw4tStpsu3gnE8HDthqV9uJBlOxHVzx09v6bpnb7TiqNQ1PLn7zqQYwOF6HWE6aJjt_/exec';

    let ITEMS = [], stockData = {}, activeUid = null, currentExpr = "";

    // --- KEYBOARD ---
    const rows = ["QWERTYUIOP".split(""), "ASDFGHJKL".split(""), "ZXCVBNM".split("")];
    function buildKB() {
        const btn = (k, c="") => `<button class="key ${c}" onclick="typeKey('${k}')">${k}</button>`;
        document.getElementById('kb1').innerHTML = rows[0].map(k => btn(k)).join('');
        document.getElementById('kb2').innerHTML = rows[1].map(k => btn(k)).join('');
        document.getElementById('kb3').innerHTML = btn('⌫', 'key-del') + rows[2].map(k => btn(k)).join('') + btn('SPACE', 'key-spc');
    }
    function typeKey(k) {
        let s = document.getElementById('searchIn');
        if(k === '⌫') s.value = s.value.slice(0, -1);
        else if(k === 'SPACE') s.value += ' ';
        else s.value += k;
        render();
    }

    // --- NUMPAD MATH ---
    function openNumpad(uid) {
        activeUid = uid;
        const item = ITEMS.find(i => i.id === uid);
        document.getElementById('npName').textContent = item.desc;
        currentExpr = String(stockData[uid] || 0);
        updateNp();
        document.getElementById('npOverlay').style.display = 'flex';
    }
    function closeNp() { document.getElementById('npOverlay').style.display = 'none'; }
    function npKey(k) {
        if(k === 'C') currentExpr = "0";
        else {
            if(currentExpr === "0" && !"+-*/.".includes(k)) currentExpr = k;
            else currentExpr += k;
        }
        updateNp();
    }
    function updateNp() {
        document.getElementById('npForm').textContent = currentExpr;
        try { 
            let res = eval(currentExpr.replace(/[^-()\d/*+.]/g, ''));
            document.getElementById('npRes').textContent = isNaN(res) ? "0" : parseFloat(res.toFixed(4));
        } catch(e) { document.getElementById('npRes').textContent = "---"; }
    }
    function confirmStock() {
        const val = document.getElementById('npRes').textContent;
        if(val === "---") return;
        
        // Instant Local Update
        stockData[activeUid] = val;
        render();

        // Push Firebase
        const safe = activeUid.replace(/[.#$[\]]/g, '_');
        db.ref('stock/' + safe).update({ qty: val, formula: currentExpr, ts: Date.now() });

        // Push Sheet
        fetch(`${API}?action=setFormula&uid=${activeUid}&setFormula=${encodeURIComponent(currentExpr)}&source=mobile`);
        closeNp();
    }

    // --- DATA ---
    function render() {
        const q = document.getElementById('searchIn').value.toLowerCase();
        const filtered = ITEMS.filter(i => i.desc.toLowerCase().includes(q) || i.id.toLowerCase().includes(q));
        document.getElementById('resCount').textContent = filtered.length;
        document.getElementById('itemList').innerHTML = filtered.map(i => `
            <div class="card">
                <div class="info">
                    <div class="uid">${i.id}</div>
                    <div class="desc">${i.desc}</div>
                    <div class="meta">${i.brand} | ${i.um} | ${i.origin}</div>
                </div>
                <div class="qb-box">
                    <div class="qb-lab">QB SYS</div>
                    <div class="qb-val">${i.qbStock || 0}</div>
                </div>
                <div class="stock-trigger" onclick="openNumpad('${i.id}')">${stockData[i.id] || 0}</div>
            </div>
        `).join('');
    }

    function init() {
        const local = localStorage.getItem('c2c_items_v6');
        if(local) { ITEMS = JSON.parse(local); render(); }

        fetch(API + '?action=getAll').then(r => r.json()).then(d => {
            if(d.ok) {
                ITEMS = d.items;
                localStorage.setItem('c2c_items_v6', JSON.stringify(ITEMS));
                document.getElementById('status').textContent = '● LIVE';
                render();
            }
        }).catch(() => document.getElementById('status').textContent = '✕ OFFLINE');

        db.ref('stock').on('value', snap => {
            const data = snap.val(); if(!data) return;
            Object.entries(data).forEach(([key, val]) => {
                const item = ITEMS.find(i => i.id.replace(/[.#$[\]]/g,'_') === key);
                if(item) stockData[item.id] = val.qty;
            });
            render();
        });
    }

    buildKB();
    init();
</script>
</body>
</html>
