<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CHEF2CHEF STOCK</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
  <link rel="manifest" href="manifest.json">
  <style>
    body { font-family: system-ui; background: #111827; color: #e5e7eb; }
    .numpad { position: fixed; bottom: 20px; right: 20px; background: rgba(31,41,55,0.95); border: 2px solid #f97316; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 9999; }
    .drag-handle { cursor: grab; }
    table { border-collapse: collapse; } .stock-cell { min-width: 80px; }
  </style>
</head>
<body class="p-4 max-w-md mx-auto">
  <div class="bg-zinc-900 rounded-2xl p-4 shadow-2xl">
    <!-- Top Bar -->
    <div class="flex justify-between items-center mb-4 text-orange-400 text-sm font-bold">
      <div>🥩 CHEF2CHEF STOCK</div>
      <div class="flex gap-3">
        <button onclick="showHistory()" class="hover:text-white">[ 📋 HISTORY ]</button>
        <button onclick="toggleDark()" class="hover:text-white">[ 🌙 DARK ]</button>
        <button onclick="window.close()" class="hover:text-white">[ EXIT ]</button>
      </div>
    </div>
    <div class="text-center text-xs text-zinc-400 mb-4">PHYSICAL STOCK MODULE • Dubai • 27 Mar 2026</div>

    <!-- Search -->
    <input id="search" type="text" placeholder="🔍 Search UID / Description / Supplier"
           class="w-full bg-zinc-800 text-white rounded-xl px-4 py-3 mb-4 focus:outline-none" onkeyup="filterTable()">

    <!-- Table -->
    <div class="overflow-auto max-h-[420px]" id="tableContainer">
      <table id="stockTable" class="w-full text-sm">
        <thead class="bg-zinc-800 sticky top-0">
          <tr><th class="text-left p-2">UID</th><th class="text-left p-2">Item Description (Packing)</th><th class="text-right p-2">Physical Stock</th><th class="p-2">U/M</th><th class="text-left p-2">Supplier</th></tr>
        </thead>
        <tbody id="tableBody" class="text-zinc-300"></tbody>
      </table>
    </div>
  </div>

  <!-- Floating Draggable Number Pad (FULL) -->
  <div id="numpad" class="numpad rounded-2xl p-4 text-xl w-72 select-none">
    <div class="drag-handle text-center text-orange-400 mb-2 text-xs">DRAG ME ↑</div>
    <div class="grid grid-cols-5 gap-2 text-center">
      <button onclick="numpadPress('7')" class="bg-zinc-700 hover:bg-orange-600 py-4 rounded-xl">7</button>
      <button onclick="numpadPress('8')" class="bg-zinc-700 hover:bg-orange-600 py-4 rounded-xl">8</button>
      <button onclick="numpadPress('9')" class="bg-zinc-700 hover:bg-orange-600 py-4 rounded-xl">9</button>
      <button onclick="numpadPress('+')" class="bg-orange-600 hover:bg-orange-500 py-4 rounded-xl">+</button>
      <button onclick="numpadPress('×')" class="bg-orange-600 hover:bg-orange-500 py-4 rounded-xl">×</button>

      <button onclick="numpadPress('4')" class="bg-zinc-700 hover:bg-orange-600 py-4 rounded-xl">4</button>
      <button onclick="numpadPress('5')" class="bg-zinc-700 hover:bg-orange-600 py-4 rounded-xl">5</button>
      <button onclick="numpadPress('6')" class="bg-zinc-700 hover:bg-orange-600 py-4 rounded-xl">6</button>
      <button onclick="numpadPress('-')" class="bg-orange-600 hover:bg-orange-500 py-4 rounded-xl">−</button>
      <button onclick="numpadPress('÷')" class="bg-orange-600 hover:bg-orange-500 py-4 rounded-xl">÷</button>

      <button onclick="numpadPress('1')" class="bg-zinc-700 hover:bg-orange-600 py-4 rounded-xl">1</button>
      <button onclick="numpadPress('2')" class="bg-zinc-700 hover:bg-orange-600 py-4 rounded-xl">2</button>
      <button onclick="numpadPress('3')" class="bg-zinc-700 hover:bg-orange-600 py-4 rounded-xl">3</button>
      <button onclick="numpadPress('.')" class="bg-zinc-700 hover:bg-orange-600 py-4 rounded-xl">.</button>
      <button onclick="numpadPress('back')" class="bg-zinc-700 hover:bg-orange-600 py-4 rounded-xl">⌫</button>

      <button onclick="numpadPress('0')" class="bg-zinc-700 hover:bg-orange-600 py-4 rounded-xl col-span-2">0</button>
      <button onclick="numpadPress('=')" class="bg-orange-600 hover:bg-orange-500 py-4 rounded-xl col-span-2">ENTER</button>
    </div>
  </div>

<script>
// === FULL JAVASCRIPT (no external file) ===
const SHEETS_URL = "https://script.google.com/macros/s/AKfycby9op7Pj91-YsnQm0Bj5F9KYF7uqWSLr9g4v-JSzfmUSRGAKE_oVtGwMNKHzX90JAfi/exec";

const firebaseConfig = { databaseURL: "https://chef2chef-stock-default-rtdb.firebaseio.com" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database().ref("stock");

let items = [], currentUid = null, currentCell = null, numpadValue = "";

async function loadData() {
  const res = await fetch(SHEETS_URL + "?action=getAll");
  const data = await res.json();
  items = data.items || [];
  renderTable();
  db.on("child_changed", snap => updateSingleRow(snap.key, snap.val()));
}

function renderTable(filtered = items) {
  const tbody = document.getElementById("tableBody");
  tbody.innerHTML = "";
  filtered.slice(0, 30).forEach(item => {
    const row = document.createElement("tr");
    row.innerHTML = `
      <td class="p-3 border-b border-zinc-700">${item.id}</td>
      <td class="p-3 border-b border-zinc-700">
        ${item.desc} (${item.pack})<br>
        <span class="text-xs text-zinc-500">(Brand/Origin: ${item.brand} ${item.origin})</span>
      </td>
      <td class="p-3 border-b border-zinc-700 text-right stock-cell">
        <span onclick="openNumpad(this, '${item.id}')" class="bg-zinc-800 px-4 py-2 rounded-lg cursor-pointer hover:bg-orange-600">[ ${item.stock} ]</span>
      </td>
      <td class="p-3 border-b border-zinc-700">${item.um}</td>
      <td class="p-3 border-b border-zinc-700">${item.sup}</td>
    `;
    tbody.appendChild(row);
  });
}

function filterTable() {
  const term = document.getElementById("search").value.toLowerCase();
  const filtered = items.filter(i => 
    (i.id + i.desc + i.sup).toLowerCase().includes(term)
  );
  renderTable(filtered);
}

function openNumpad(cell, uid) {
  currentCell = cell; currentUid = uid; numpadValue = "";
  document.getElementById("numpad").style.display = "block";
}

function numpadPress(key) {
  if (key === "back") {
    numpadValue = numpadValue.slice(0, -1);
  } else if (key === "=") {
    // ENTER - send to Apps Script
    if (numpadValue) sendQty(numpadValue);
  } else {
    numpadValue += key;
  }
  // Update display logic here (you can extend for live preview)
}

async function sendQty(value) {
  // Calls your Apps Script add or set
  const res = await fetch(SHEETS_URL + `?uid=${currentUid}&add=${value}`);
  const data = await res.json();
  if (data.ok) {
    currentCell.textContent = `[ ${data.newVal} ]`;
    document.getElementById("numpad").style.display = "none";
  }
}

function showHistory() { alert("History modal coming soon"); }
function toggleDark() { document.body.style.background = document.body.style.background === "#111827" ? "#f8fafc" : "#111827"; }

// Drag support for numpad
let isDragging = false, offsetX, offsetY;
const numpadEl = document.getElementById("numpad");
document.querySelector(".drag-handle").addEventListener("mousedown", e => {
  isDragging = true;
  offsetX = e.clientX - numpadEl.offsetLeft;
  offsetY = e.clientY - numpadEl.offsetTop;
});
document.addEventListener("mousemove", e => {
  if (isDragging) {
    numpadEl.style.left = (e.clientX - offsetX) + "px";
    numpadEl.style.top = (e.clientY - offsetY) + "px";
    numpadEl.style.bottom = "auto";
  }
});
document.addEventListener("mouseup", () => isDragging = false);

// Load on start
loadData();
</script>
</body>
</html>
