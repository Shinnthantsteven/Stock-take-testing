<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chef2Chef | Stock Engine</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🥩</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --brand:#10b981; --danger:#ef4444; --bg:#020617; --text:#f1f5f9; --border:rgba(255,255,255,0.10); }
        body.light { --bg:#f8fafc; --text:#0f172a; --border:rgba(0,0,0,0.08); }
        * { box-sizing:border-box; margin:0; padding:0; }
        body,html { font-family:'Plus Jakarta Sans',sans-serif; background:var(--bg); color:var(--text); height:100vh; overflow:hidden; }

        .nav { padding:10px 28px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--border); }
        .logo-text { font-weight:800; font-size:16px; display:flex; align-items:center; gap:10px; }
        .tbl-wrap { overflow-y:auto; height:calc(100vh - 115px); padding:0 28px 20px; }
        table { width:100%; border-collapse:collapse; table-layout:fixed; }
        thead th { position:sticky; top:0; background:#0d1829; color:#64748b; padding:11px 10px; font-size:9px; font-weight:800; }
        td { padding:14px 10px; border-bottom:1px solid var(--border); font-size:13px; }
        .cell-qb { color:var(--brand); font-weight:800; font-size:16px; }

        @media (max-width: 768px) {
            .nav { padding:12px 12px; }
            .tbl-wrap { height:calc(100vh - 108px); padding:0 10px; }
            .desc-name { font-size:15px; }
            .desc-sub { font-size:12px; color:#94a3b8; margin-top:2px; }
            .cell-qb { font-size:19px; }
            .numpad-popup { width:92% !important; left:4% !important; max-width:340px; }
            .np-grid button { height:54px; font-size:18px; }
        }
    </style>
</head>
<body>
<div class="loading-screen" id="loadScreen">
    <div style="font-size:20px;font-weight:800;letter-spacing:-0.5px;">CHEF2CHEF <span style="color:var(--brand)">STOCK</span></div>
    <div class="loading-bar-wrap"><div class="loading-bar" id="loadBar"></div></div>
    <div class="loading-text" id="loadTxt">Connecting…</div>
</div>
<nav class="nav">
    <a href="https://chef2chef.ae" target="_blank" class="logo-text">
        <span style="font-size:24px">🥩</span>
        CHEF2CHEF <span style="color:var(--brand)">STOCK</span>
    </a>
    <div class="nav-right">
        <span id="syncBadge" class="sync-badge">● READY</span>
        <button class="hist-btn" onclick="openHistory()">📋 HISTORY</button>
        <button class="mode-btn" id="modeBtn" onclick="toggleMode()">🌙 DARK</button>
        <span style="font-size:10px;font-weight:800;color:#475569;">PHYSICAL STOCK MODULE</span>
    </div>
</nav>
<div class="tbl-wrap" id="tblWrap">
    <table>
        <colgroup><col class="c1"><col class="c2"><col class="c3"><col class="c4"><col class="c5"><col class="c6"><col class="c7"><col class="c8"></colgroup>
        <thead><tr>
            <th>UID</th>
            <th>Item Description</th>
            <th>📦 Physical Stock</th>
            <th>QB Stock</th>
            <th>U/M</th>
            <th>Pack</th>
            <th>Supplier</th>
            <th>Brand / Origin</th>
        </tr></thead>
        <tbody id="tbody"></tbody>
    </table>
</div>
<div class="portal-bar">
    <div class="bar-inner">
        <span class="bar-icon">🔍</span>
        <input id="searchIn" type="text" placeholder="Search UID, description, supplier, category…">
        <span class="bar-count" id="barCount">—</span>
    </div>
    <button class="bar-exit" onclick="location.reload()">EXIT</button>
</div>
<div class="hist-overlay" id="histOverlay" onclick="closeHistory()"></div>
<div class="hist-drawer" id="histDrawer">
    <div class="hist-head">
        <span class="hist-title">📋 STOCK HISTORY</span>
        <button class="hist-close" onclick="closeHistory()">✕</button>
    </div>
    <div class="hist-body" id="histBody"><div class="hist-empty">Loading…</div></div>
</div>
<div class="numpad-popup" id="numpadPopup">
