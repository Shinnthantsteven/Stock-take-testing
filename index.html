<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
/* ── VARIABLES ── */
:root{
  --brand:#10b981; --brand-dim:rgba(16,185,129,.10); --brand-border:rgba(16,185,129,.28);
  --danger:#ef4444; --warn:#fbbf24;
  --bg:#020617; --bg2:#0d1829;
  --text:#f1f5f9; --text2:#94a3b8; --text3:#475569;
  --border:rgba(255,255,255,.08); --border2:rgba(255,255,255,.04);
  --uid-clr:#475569; --pack-clr:#818cf8; --cost-clr:#10b981;
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --row-h:calc((100dvh - 132px) / 7);
}
body.light{
  --bg:#f8fafc; --bg2:#e2e8f0;
  --text:#0f172a; --text2:#475569; --text3:#94a3b8;
  --border:rgba(0,0,0,.08); --border2:rgba(0,0,0,.04);
  --uid-clr:#94a3b8; --pack-clr:#6366f1; --cost-clr:#059669;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;height:100dvh;overflow:hidden;font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);}

/* ── LOADING ── */
#loadScreen{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
.load-logo{font-weight:800;font-size:18px;display:flex;align-items:center;gap:8px;}
.load-logo span{color:var(--brand);}
.load-bar-wrap{width:220px;height:3px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;}
body.light .load-bar-wrap{background:rgba(0,0,0,.08);}
.load-bar{height:100%;background:var(--brand);border-radius:3px;width:0%;transition:width .2s;}
.load-txt{font-size:11px;font-weight:700;color:var(--text3);}

/* ── LOGIN SCREEN ── */
#loginScreen{position:fixed;inset:0;background:var(--bg);z-index:9998;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;padding:30px;}
#loginScreen.hidden{display:none;}
.login-logo{font-weight:800;font-size:20px;display:flex;align-items:center;gap:10px;}
.login-logo span{color:var(--brand);}
.login-subtitle{font-size:12px;font-weight:700;color:var(--text3);letter-spacing:.5px;}
.login-card{width:100%;max-width:320px;display:flex;flex-direction:column;gap:12px;}
.login-input{width:100%;padding:14px 16px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:12px;color:var(--text);font-size:15px;font-weight:600;font-family:'Plus Jakarta Sans',sans-serif;outline:none;transition:border-color .2s;}
.login-input:focus{border-color:var(--brand);}
.login-input::placeholder{color:var(--text3);}
body.light .login-input{background:rgba(0,0,0,.04);border-color:rgba(0,0,0,.10);color:#0f172a;}
body.light .login-input::placeholder{color:#94a3b8;}
.login-btn{width:100%;padding:15px;background:var(--brand);border:none;border-radius:12px;color:#020617;font-size:15px;font-weight:800;font-family:'Plus Jakarta Sans',sans-serif;cursor:pointer;transition:opacity .2s;}
.login-btn:active{opacity:.8;}
.login-err{font-size:11px;font-weight:700;color:var(--danger);text-align:center;min-height:16px;}
/* user badge in nav */
.nav-user{font-size:9px;font-weight:800;padding:3px 10px;border-radius:20px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);color:var(--text2);cursor:pointer;white-space:nowrap;}
.nav-user:active{opacity:.7;}
body.light .nav-user{background:rgba(0,0,0,.05);border-color:rgba(0,0,0,.10);}


/* ── NAV ── */
.nav{
  min-height:50px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 16px;
  padding-top:env(safe-area-inset-top, 0px);
  border-bottom:1px solid var(--border);
  background:var(--bg);
  flex-shrink:0;
}
.nav-logo{font-weight:800;font-size:15px;display:flex;align-items:center;gap:8px;color:inherit;text-decoration:none;}
.nav-logo span{color:var(--brand);}
.nav-right{display:flex;align-items:center;gap:7px;}
.sync-badge{font-size:9px;font-weight:800;padding:3px 10px;border-radius:20px;background:var(--brand-dim);border:1px solid var(--brand-border);color:var(--brand);white-space:nowrap;transition:all .3s;}
.sync-badge.syncing{background:rgba(251,191,36,.10);border-color:rgba(251,191,36,.28);color:var(--warn);}
.sync-badge.error{background:rgba(239,68,68,.10);border-color:rgba(239,68,68,.28);color:#ef4444;}
.mode-btn{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);color:var(--text);border-radius:20px;padding:3px 10px;font-size:9px;font-weight:800;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:opacity .2s;}
.mode-btn:active{opacity:.7;}
body.light .mode-btn{background:rgba(0,0,0,.05);border-color:rgba(0,0,0,.10);}
.hist-btn{background:rgba(99,102,241,.12);border:1px solid rgba(99,102,241,.3);color:#818cf8;border-radius:20px;padding:3px 10px;font-size:10px;font-weight:800;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;white-space:nowrap;}
.hist-btn:hover{background:rgba(99,102,241,.22);}
.nav-label{font-size:9px;font-weight:800;color:var(--text3);letter-spacing:.5px;display:none;}

/* ── INSTALL BANNER ── */
#installBanner{display:none;align-items:center;justify-content:space-between;padding:6px 16px;background:rgba(16,185,129,.08);border-bottom:1px solid var(--brand-border);flex-shrink:0;}
#installBanner.show{display:flex;}
.install-txt{font-size:10px;font-weight:700;color:var(--brand);}
.install-btn{background:var(--brand);border:none;color:#020617;padding:4px 12px;border-radius:20px;font-size:10px;font-weight:800;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;}
.install-x{background:none;border:none;color:var(--text3);font-size:14px;cursor:pointer;padding:0 4px;}

/* ── TABLE SHARED ── */
.tbl-area{overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}
.tbl-area::-webkit-scrollbar{width:3px;}
.tbl-area::-webkit-scrollbar-thumb{background:rgba(255,255,255,.06);border-radius:2px;}
body.light .tbl-area::-webkit-scrollbar-thumb{background:rgba(0,0,0,.08);}
.col-heads{position:sticky;top:0;z-index:50;background:var(--bg2);border-top:1px solid var(--border);border-bottom:1px solid var(--border);}
.col-h{padding:8px 10px;font-size:8px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:.9px;}
.col-h:first-child{padding-left:18px;}
.col-h:last-child{padding-right:18px;}
.item-row{border-bottom:1px solid var(--border2);align-items:center;transition:background .12s;}
.item-row:hover{background:rgba(255,255,255,.025);}
body.light .item-row:hover{background:rgba(0,0,0,.02);}
.item-row.updated{animation:flashRow .7s ease;}
@keyframes flashRow{0%{background:rgba(16,185,129,.1);}100%{background:transparent;}}
.cell{padding:8px 10px;overflow:hidden;}
.cell:first-child{padding-left:18px;}
.cell:last-child{padding-right:18px;}

/* Shared type styles */
.cell-uid{font-family:monospace;font-size:10px;font-weight:700;color:var(--uid-clr);line-height:1.5;}
.desc-name{font-weight:700;font-size:14px;color:var(--text);line-height:1.4;margin-bottom:3px;}
.desc-meta{display:flex;flex-wrap:wrap;gap:3px;margin-top:2px;}
.pill{font-size:7.5px;font-weight:800;padding:2px 6px;border-radius:20px;white-space:nowrap;}
.pill-cat{background:rgba(251,191,36,.12);color:#fbbf24;border:1px solid rgba(251,191,36,.3);}
.pill-brand{background:rgba(59,130,246,.10);color:#60a5fa;border:1px solid rgba(59,130,246,.22);}
.pill-origin{background:rgba(16,185,129,.08);color:#10b981;border:1px solid rgba(16,185,129,.2);}
.cell-stock{display:flex;align-items:center;justify-content:center;}
.stock-wrap{display:flex;flex-direction:column;align-items:center;gap:3px;}
.stock-qty{font-size:17px;font-weight:800;color:var(--brand);line-height:1;cursor:pointer;display:inline-block;}
.eq-wrap{display:flex;align-items:center;gap:3px;}
.eq-input{font-size:8.5px;font-weight:700;color:rgba(255,255,255,.25);background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:5px;padding:2px 5px;width:82px;outline:none;font-family:monospace;caret-color:var(--brand);cursor:text;transition:border-color .2s,color .2s;-webkit-appearance:none;}
.eq-input:focus{border-color:rgba(251,191,36,.55);color:rgba(255,255,255,.9);background:rgba(251,191,36,.04);}
body.light .eq-input{color:rgba(0,0,0,.28);background:rgba(0,0,0,.03);border-color:rgba(0,0,0,.09);}
body.light .eq-input:focus{color:rgba(0,0,0,.8);background:rgba(251,191,36,.06);border-color:rgba(251,191,36,.5);}
.eq-ok{display:none;width:16px;height:16px;border-radius:50%;background:var(--brand);border:none;color:#020617;font-size:9px;font-weight:900;cursor:pointer;align-items:center;justify-content:center;box-shadow:0 2px 5px rgba(16,185,129,.4);flex-shrink:0;}
.eq-ok.on{display:flex;}
.stock-empty-btn{height:28px;border:1.5px dashed rgba(255,255,255,.12);border-radius:7px;background:rgba(255,255,255,.02);cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.15);font-size:18px;}
.stock-empty-btn:hover,.stock-empty-btn:active{border-color:rgba(16,185,129,.5);background:rgba(16,185,129,.04);}
body.light .stock-empty-btn{border-color:rgba(0,0,0,.13);color:rgba(0,0,0,.15);}
.cell-um{font-size:11px;font-weight:700;color:var(--text2);}
.cell-sup{font-size:13px;font-weight:700;color:var(--text);line-height:1.4;}
.cell-pack-col{font-size:13px;font-weight:700;color:var(--pack-clr);}
.cell-brand-col{}
.cell-cost{font-size:14px;font-weight:800;color:var(--cost-clr);}
.empty-state{text-align:center;padding:60px 20px;color:var(--text3);font-size:12px;font-weight:700;}

/* ── PORTAL BAR ── */
.portal-bar{position:fixed;bottom:calc(14px + var(--safe-bottom));left:50%;transform:translateX(-50%);border-radius:100px;border:1.5px solid rgba(255,255,255,.22);display:flex;align-items:center;z-index:1000;overflow:hidden;background:rgba(2,6,23,.7);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);}
body.light .portal-bar{border-color:rgba(0,0,0,.18);background:rgba(248,250,252,.88);}
.portal-bar::before{content:'';position:absolute;top:-1.5px;left:12%;right:12%;height:3px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.85) 40%,white 50%,rgba(255,255,255,.85) 60%,transparent);border-radius:999px;pointer-events:none;z-index:2;}
body.light .portal-bar::before{background:linear-gradient(90deg,transparent,rgba(0,0,0,.3) 40%,rgba(0,0,0,.5) 50%,rgba(0,0,0,.3) 60%,transparent);}
.portal-bar:focus-within{border-color:rgba(16,185,129,.5);}
.bar-inner{flex:1;display:flex;align-items:center;gap:8px;padding:0 18px;}
.bar-icon{font-size:13px;opacity:.35;flex-shrink:0;}
#searchIn{background:transparent;border:none;color:var(--text);font-size:14px;font-weight:700;outline:none;flex:1;padding:14px 0;font-family:'Plus Jakarta Sans',sans-serif;}
#searchIn::placeholder{color:var(--text);opacity:.3;font-weight:600;}
.bar-count{font-size:10px;font-weight:800;color:var(--brand);background:var(--brand-dim);border:1px solid var(--brand-border);border-radius:50px;padding:3px 11px;white-space:nowrap;flex-shrink:0;}
.bar-exit{background:var(--danger);border:none;color:white;padding:0 22px;height:46px;font-weight:800;font-size:12px;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;border-radius:0 100px 100px 0;flex-shrink:0;}
.bar-exit:active{background:#dc2626;}

/* ── NUMPAD ── */
@keyframes popIn{from{transform:scale(0.86);opacity:0;}to{transform:scale(1);opacity:1;}}
.np-popup{position:fixed;z-index:9000;display:none;flex-direction:column;width:176px;border-radius:20px;background:rgba(255,255,255,.09);backdrop-filter:blur(40px) saturate(200%);-webkit-backdrop-filter:blur(40px) saturate(200%);border:1px solid rgba(255,255,255,.22);box-shadow:0 1px 0 rgba(255,255,255,.3) inset,0 8px 32px rgba(0,0,0,.35);overflow:hidden;user-select:none;touch-action:none;}
.np-popup.open{display:flex;animation:popIn .2s cubic-bezier(.16,1,.3,1);}
.np-popup::before{content:'';position:absolute;top:0;left:10%;right:10%;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.85) 50%,transparent);pointer-events:none;z-index:10;}
body.light .np-popup{background:rgba(255,255,255,.84);border-color:rgba(0,0,0,.13);box-shadow:0 1px 0 rgba(255,255,255,.95) inset,0 8px 32px rgba(0,0,0,.12);}
.np-drag{padding:7px 8px 6px 10px;cursor:grab;display:flex;align-items:flex-start;justify-content:space-between;gap:4px;border-bottom:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.03);}
.np-drag:active{cursor:grabbing;}
body.light .np-drag{border-bottom-color:rgba(0,0,0,.07);background:rgba(0,0,0,.02);}
.np-drag-left{display:flex;align-items:flex-start;gap:5px;flex:1;min-width:0;}
.np-dots{display:grid;grid-template-columns:repeat(3,3px);gap:2px;flex-shrink:0;margin-top:2px;}
.np-dots span{width:3px;height:3px;border-radius:50%;background:rgba(255,255,255,.25);display:block;}
body.light .np-dots span{background:rgba(0,0,0,.18);}
.np-drag-name{font-size:8.5px;font-weight:800;color:rgba(255,255,255,.55);white-space:normal;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;line-height:1.35;}
body.light .np-drag-name{color:rgba(0,0,0,.45);}
.np-um-badge{display:none;font-size:8px;font-weight:800;padding:2px 6px;border-radius:20px;background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.28);color:var(--brand);margin-top:2px;}
.np-ok{width:22px;height:22px;border-radius:50%;background:var(--brand);border:none;color:#020617;font-size:11px;font-weight:900;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(16,185,129,.5);transition:transform .1s;margin-top:1px;}
.np-ok:active{transform:scale(.86);}
.np-existing{font-size:8px;font-weight:700;color:rgba(255,255,255,.28);padding:2px 10px 0;text-align:right;}
body.light .np-existing{color:rgba(0,0,0,.28);}
.np-existing span{color:var(--brand);}
.np-display{padding:2px 10px 0;text-align:right;}
.np-value{font-size:22px;font-weight:700;line-height:1;letter-spacing:-.5px;color:rgba(255,255,255,.88);word-break:break-all;transition:color .1s;min-height:24px;}
.np-value.active{color:#fff;text-shadow:0 0 14px rgba(16,185,129,.45);}
body.light .np-value{color:#0f172a;}
body.light .np-value.active{color:#059669;text-shadow:none;}
.np-preview{font-size:7px;font-weight:700;color:rgba(251,191,36,.85);text-align:right;min-height:9px;padding:0 10px 2px;line-height:1.3;}
.np-ops{display:flex;gap:3px;padding:2px 5px 3px;}
.np-op-tab{flex:1;padding:5px 0;border-radius:7px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.07);color:rgba(255,255,255,.45);font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;line-height:1;}
.np-op-tab.active{background:var(--brand-dim);border-color:var(--brand-border);color:var(--brand);}
.np-op-tab:active{transform:scale(.88);}
body.light .np-op-tab{background:rgba(0,0,0,.05);border-color:rgba(0,0,0,.08);color:rgba(0,0,0,.35);}
.np-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;padding:0 6px 6px;}
.np-btn{border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.09);border-radius:9px;height:42px;font-size:15px;font-weight:600;color:rgba(255,255,255,.92);cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:background .08s,transform .07s;display:flex;align-items:center;justify-content:center;}
.np-btn:active{background:rgba(255,255,255,.22);transform:scale(.88);}
body.light .np-btn{background:rgba(0,0,0,.06);border-color:rgba(0,0,0,.09);color:#0f172a;}
body.light .np-btn:active{background:rgba(0,0,0,.13);}
.np-btn-back{color:rgba(255,255,255,.4);font-size:13px;}
body.light .np-btn-back{color:rgba(0,0,0,.35);}

/* ── HISTORY DRAWER ── */
.hist-overlay{position:fixed;inset:0;z-index:7000;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);display:none;}
.hist-overlay.open{display:block;}
.hist-drawer{position:fixed;top:0;right:-105%;width:min(400px,92%);height:100dvh;background:var(--bg);border-left:1px solid var(--border);z-index:7001;display:flex;flex-direction:column;transition:right .3s cubic-bezier(.16,1,.3,1);box-shadow:-12px 0 40px rgba(0,0,0,.5);}
.hist-drawer.open{right:0;}
.hist-head{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.hist-title{font-size:13px;font-weight:800;}
.hist-close{background:none;border:none;color:var(--text);font-size:18px;cursor:pointer;opacity:.45;}
.hist-close:hover{opacity:1;}
.hist-body{flex:1;overflow-y:auto;padding:8px;}
.hist-body::-webkit-scrollbar{width:3px;}
.hist-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);}
.hist-row{padding:10px 12px;border-radius:10px;margin-bottom:5px;border:1px solid var(--border);}
.hist-row:hover{background:rgba(255,255,255,.02);}
.hist-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px;}
.hist-uid{font-family:monospace;font-size:9px;color:var(--text3);font-weight:700;}
.hist-ts{font-size:8px;color:var(--text3);}
.hist-desc{font-size:11px;font-weight:700;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hist-vals{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;flex-wrap:wrap;}
.hist-old{color:var(--text3);}
.hist-arr{color:var(--text3);font-size:9px;}
.hist-new{color:var(--brand);font-size:14px;font-weight:800;}
.hist-chg{font-size:9px;font-weight:800;padding:2px 7px;border-radius:20px;}
.hist-chg.pos{background:rgba(16,185,129,.10);color:#10b981;border:1px solid rgba(16,185,129,.22);}

/* ── CUSTOM MOBILE QWERTY SEARCH KEYBOARD ── */
.qkb{
  position:fixed;bottom:0;left:0;right:0;z-index:5000;
  background:rgba(13,24,41,.97);
  border-top:1px solid rgba(255,255,255,.10);
  padding:4px 4px 0;
  display:none;flex-direction:column;gap:3px;
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
}
.qkb.open{display:flex;}
body.light .qkb{background:rgba(230,235,245,.97);border-top-color:rgba(0,0,0,.10);}


/* iOS-style pill with blinking cursor */
.qkb-input-display{
  flex:1;font-size:15px;font-weight:700;color:var(--text);
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);
  border-radius:22px;padding:7px 14px;min-height:36px;
  white-space:nowrap;overflow:hidden;
  letter-spacing:.2px;
  display:flex;align-items:center;
}
.qkb-text-before,.qkb-text-after{color:var(--text);}
.qkb-cursor{
  display:inline-block;
  width:2px;
  height:1.1em;
  background:var(--brand);
  border-radius:1px;
  vertical-align:middle;
  margin:0 0px;
  animation:qkbBlink .9s step-end infinite;
  user-select:none;
  flex-shrink:0;
}
@keyframes qkbBlink{0%,100%{opacity:1;}50%{opacity:0;}}
body.light .qkb-input-display{background:rgba(0,0,0,.05);border-color:rgba(0,0,0,.12);}
.qkb-input-display.empty{color:var(--text3);display:block;}
.qkb-clear{
  background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.28);
  color:#ef4444;border-radius:20px;padding:6px 12px;
  font-size:10px;font-weight:800;cursor:pointer;
  font-family:'Plus Jakarta Sans',sans-serif;white-space:nowrap;flex-shrink:0;
}
.qkb-done{
  background:var(--brand);border:none;
  color:#020617;border-radius:20px;padding:6px 14px;
  font-size:10px;font-weight:800;cursor:pointer;
  font-family:'Plus Jakarta Sans',sans-serif;white-space:nowrap;flex-shrink:0;
}

.qkb-row{display:flex;justify-content:center;gap:4px;}
.qkb-key{
  flex:1;height:36px;
  border:1px solid rgba(255,255,255,.09);
  background:rgba(255,255,255,.09);
  border-radius:7px;
  font-size:14px;font-weight:600;
  color:rgba(255,255,255,.90);
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .07s,transform .06s;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
}
.qkb-key:active{background:rgba(255,255,255,.25);transform:scale(.88);}
body.light .qkb-key{background:rgba(0,0,0,.07);border-color:rgba(0,0,0,.10);color:#0f172a;}
body.light .qkb-key:active{background:rgba(0,0,0,.18);}
.qkb-key-space{
  flex:5;
  background:rgba(16,185,129,.12);
  border-color:rgba(16,185,129,.22);
  color:var(--brand);
  font-size:12px;font-weight:800;
  letter-spacing:1px;
}
/* Number row */
.qkb-key-num{font-size:13px;font-weight:700;color:rgba(255,255,255,.75);}
body.light .qkb-key-num{color:rgba(0,0,0,.5);}
/* Backspace — small fixed width right */
.qkb-key-back{
  flex:0 0 60px;
  height:44px;
  font-size:22px;
  background:rgba(239,68,68,.15);
  border-color:rgba(239,68,68,.28);
  color:#ef4444;
  border-radius:7px;
}
body.light .qkb-key-back{background:rgba(239,68,68,.10);}
.qkb-row:not(.qkb-row-bottom) .qkb-key{max-width:38px;}
.qkb-row:nth-child(4) .qkb-key{max-width:46px;}
.qkb-row-bottom{padding:0 2px;}
.qkb-row-bottom .qkb-key{height:44px;}

/* Search bar — tight to bottom, only true safe area */
.qkb-bar{
  display:flex;align-items:center;gap:8px;
  padding:4px 8px env(safe-area-inset-bottom, 4px);
  margin-top:0;
}

/* ── CUSTOM MOBILE FORMULA KEYBOARD ── */

<script>
// ── CONFIG ────────────────────────────────────────────────────
const firebaseConfig={apiKey:"AIzaSyBRZ-tXbefzOdFHPgsDUmumZtVOq-6DLdU",authDomain:"chef2chef-stock.firebaseapp.com",databaseURL:"https://chef2chef-stock-default-rtdb.firebaseio.com",projectId:"chef2chef-stock",storageBucket:"chef2chef-stock.firebasestorage.app",messagingSenderId:"510949862594",appId:"1:510949862594:web:2bae9e49826221e5a69f5b"};
firebase.initializeApp(firebaseConfig);
firebase.auth().signInAnonymously().catch(()=>{});
const db=firebase.database();

function normalizeFormula(f){
  if(!f) return '';
  return String(f).replace(/\s/g,'').replace(/^=/,'');
}
const SHEETS_URL='https://script.google.com/macros/s/AKfycbyHiiuDy1HQzz_D9O1f1hZyL__81DyFW4bT2bieNlmIWj86NRtSQ9lfH-O5AHEtR3fp/exec';

// ── STATE ─────────────────────────────────────────────────────
let ITEMS=[],historyLog=[];
const stockData={},formulaData={};
let fbListening=false,searchQuery='';
const isDesktop=()=>window.innerWidth>=768;

function xe(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function cleanDesc(desc, id){
  let d = String(desc||'').trim();
  if(id && d.startsWith(id)){
    d = d.slice(id.length).trim();
    d = d.replace(/^[\s\(\-\:\|]+/, '').replace(/\)\s*$/, '').trim();
  }
  return d || desc;
}

function setSync(state,msg){
  const el=document.getElementById('syncBadge');
  el.className='sync-badge'+(state==='ok'?'':' '+state);
  el.textContent=msg;
}

function toggleMode(){
  const light=document.body.classList.toggle('light');
  document.getElementById('modeBtn').textContent=light?'☀️ LIGHT':'🌙 DARK';
  localStorage.setItem('c2c_mode',light?'light':'dark');
}
function forceRefresh(){
  localStorage.removeItem('c2c_items');
  localStorage.removeItem('c2c_items_ts');
  setSync('syncing','⟳ REFRESHING');
  location.reload();
}

function saveLocal(){try{localStorage.setItem('c2c_stock',JSON.stringify({s:stockData,f:formulaData}));}catch(e){}}
function loadLocal(){try{const d=JSON.parse(localStorage.getItem('c2c_stock')||'{}');if(d.s)Object.assign(stockData,d.s);if(d.f)Object.assign(formulaData,d.f);}catch(e){}}
function saveHistory(){try{localStorage.setItem('c2c_history',JSON.stringify(historyLog.slice(0,500)));}catch(e){}}
function loadHistory(){try{historyLog=JSON.parse(localStorage.getItem('c2c_history')||'[]');}catch(e){}}

function openHistory(){
  document.getElementById('histDrawer').classList.add('open');
  document.getElementById('histOverlay').classList.add('open');
  fetchHistory();
}
function closeHistory(){
  document.getElementById('histDrawer').classList.remove('open');
  document.getElementById('histOverlay').classList.remove('open');
}
function fetchHistory(){
  document.getElementById('histBody').innerHTML='<div class="hist-empty">Loading…</div>';
  fetch(SHEETS_URL+'?action=getHistory&_t='+Date.now(),{cache:'no-store',redirect:'follow'})
    .then(r=>r.json()).then(d=>{
      if(d.ok&&d.history){
        d.history.forEach(e=>{if(!historyLog.some(l=>l.ts===e.ts&&l.uid===e.uid))historyLog.unshift(e);});
        historyLog=historyLog.slice(0,500);
        saveHistory();
      }
      renderHistory();
    }).catch(()=>renderHistory());
}
function renderHistory(){
  const body=document.getElementById('histBody');
  if(!historyLog.length){body.innerHTML='<div class="hist-empty">No history yet</div>';return;}
  body.innerHTML=historyLog.map(e=>{
    const added=String(e.added||'');
    const isPos=!added.startsWith('-');
    const src=e.source==='sheet'?'📊 SHEET':e.source==='mobile'?'📱 MOBILE':'🌐 WEB';
    const srcCls=e.source==='sheet'?'sheet':e.source==='mobile'?'mobile':'web';
    return`<div class="hist-row">
      <div class="hist-top"><span class="hist-uid">${xe(e.uid)}</span><span class="hist-ts">${xe(e.ts)}</span></div>
      <div class="hist-desc">${xe(e.desc)}</div>
      <div class="hist-vals">
        <span class="hist-old">${e.oldVal}</span><span class="hist-arr">→</span>
        <span class="hist-new">${e.newVal}</span>
        <span class="hist-chg ${isPos?'pos':'neg'}">${xe(added)}</span>
        <span class="hist-src ${srcCls}">${src}</span>
      </div>
      ${e.formula?`<div style="margin-top:3px;font-family:monospace;font-size:9px;color:#fbbf24">=<span>${xe(normalizeFormula(e.formula))}</span></div>`:''}
    </div>`;
  }).join('');
}
function addLocalHistory(uid,oldVal,newVal,added,formula,source){
  const item=ITEMS.find(r=>r.id===uid);
  const ts=new Date().toISOString().replace('T',' ').slice(0,19);
  const addStr=added>=0?'+'+parseFloat(added.toFixed(4)):String(parseFloat(added.toFixed(4)));
  const who=currentUser?currentUser.name:(source||'web');
  historyLog.unshift({ts,uid,desc:item?item.desc:uid,oldVal,newVal,added:addStr,formula:formula||'',source:who});
  if(historyLog.length>500)historyLog.pop();
  saveHistory();
  if(document.getElementById('histDrawer').classList.contains('open'))renderHistory();
}

// ── FIREBASE ──────────────────────────────────────────────────
const ownWrites={};
function lockWrite(uid){ownWrites[uid]=Date.now();}
function isOwnEcho(uid){return ownWrites[uid]&&(Date.now()-ownWrites[uid])<8000;}
setInterval(()=>{const now=Date.now();Object.keys(ownWrites).forEach(k=>{if(now-ownWrites[k]>10000)delete ownWrites[k];});},30000);

function updateSheetBackground(uid,qty,formula,added){
  const params=new URLSearchParams({action:'updateRow',uid,qty,formula:normalizeFormula(formula)||'',added:added??0,_t:Date.now()});
  fetch(SHEETS_URL+'?'+params.toString(),{cache:'no-store',redirect:'follow',keepalive:true}).catch(()=>{});
}

function fbWrite(uid,qty,formula,added){
  lockWrite(uid);
  const k=uid.replace(/[.#$[\]]/g,'_');
  db.ref('stock/'+k).set({qty,formula:formula||String(qty),ts:Date.now(),added:added??0}).then(()=>{
    setSync('ok','● LIVE');
    updateSheetBackground(uid,qty,formula||String(qty),added??0);
  }).catch(()=>setSync('error','✕ OFFLINE'));
}

function startFirebaseListener(){
  if(fbListening)return;
  fbListening=true;
  db.ref('stock').on('child_changed',snap=>{
    const k=snap.key,val=snap.val();
    if(!val||!ITEMS.length)return;
    const item=ITEMS.find(r=>r.id.replace(/[.#$[\]]/g,'_')===k);
    if(!item)return;
    const uid=item.id;
    if(isOwnEcho(uid))return;
    const newQty=parseFloat(val.qty)||0;
    const newForm=normalizeFormula(val.formula||String(newQty));
    const locForm=normalizeFormula(formulaData[uid]||'');
    if(Math.abs(newQty-(stockData[uid]||0))>0.0001||newForm!==locForm){
      const oldVal=stockData[uid]||0;
      stockData[uid]=newQty;formulaData[uid]=newForm;
      updateRowDisplay(uid);
      addLocalHistory(uid,oldVal,newQty,val.added||(newQty-oldVal),newForm,val.source||'web');
      saveLocal();setSync('ok','● LIVE');
    }
  });
}

// ── WRITE OPS ─────────────────────────────────────────────────
function sendAdd(uid,addQty){
  const oldVal=stockData[uid]||0;
  const newVal=parseFloat((oldVal+addQty).toFixed(4));
  const oldForm=normalizeFormula(formulaData[uid]||String(oldVal));
  const newForm=oldVal===0?String(addQty):oldForm+(addQty>=0?'+':'')+addQty;
  stockData[uid]=newVal;formulaData[uid]=newForm;
  saveLocal();updateRowDisplay(uid);
  addLocalHistory(uid,oldVal,newVal,addQty,newForm,isDesktop()?'website':'mobile');
  setSync('syncing','⟳ SAVING');
  fbWrite(uid,newVal,newForm,addQty);
}
function sendSet(uid,qty){
  const oldVal=stockData[uid]||0;
  const formula=String(qty);
  stockData[uid]=qty;formulaData[uid]=formula;
  saveLocal();updateRowDisplay(uid);
  addLocalHistory(uid,oldVal,qty,qty-oldVal,formula,isDesktop()?'website':'mobile');
  setSync('syncing','⟳ SAVING');
  fbWrite(uid,qty,formula,qty-oldVal);
}
function sendSetFormula(uid,formula,qty){
  const oldVal=stockData[uid]||0;
  const clean=normalizeFormula(formula);
  stockData[uid]=qty;formulaData[uid]=clean;
  saveLocal();updateRowDisplay(uid);
  addLocalHistory(uid,oldVal,qty,qty-oldVal,clean,isDesktop()?'website':'mobile');
  setSync('syncing','⟳ SAVING');
  fbWrite(uid,qty,clean,qty-oldVal);
}

// ── FORMULA BAR ───────────────────────────────────────────────
function onEqIn(id,sid){document.getElementById('eqok-'+sid)?.classList.add('on');}
function onEqKd(e,id,sid){
  if(e.key==='Enter'){e.preventDefault();confirmEq(id,sid);}
  if(e.key==='Escape'){const inp=document.getElementById('eq-'+sid);if(inp)inp.value='='+(formulaData[id]||String(stockData[id]||0));document.getElementById('eqok-'+sid)?.classList.remove('on');inp?.blur();}
}
function confirmEq(id,sid){
  const inp=document.getElementById('eq-'+sid);if(!inp)return;
  let raw=inp.value.trim();if(raw.startsWith('='))raw=raw.slice(1);
  const clean=raw.replace(/[^0-9.+\-*\/()]/g,'');
  if(!clean){inp.value='='+(formulaData[id]||String(stockData[id]||0));return;}
  let qty;try{qty=Math.max(0,parseFloat(Function('return ('+clean+')')().toFixed(4)));}catch(e){qty=stockData[id]||0;}
  inp.value='='+clean;
  document.getElementById('eqok-'+sid)?.classList.remove('on');
  inp.blur();
  sendSetFormula(id,clean,qty);
}

// ── RENDER ────────────────────────────────────────────────────
function stockCellHtmlMobile(id,um){
  const qty=stockData[id]||0;
  const sid=id.replace(/[^a-zA-Z0-9_-]/g,'_');

    const disp=qty%1===0?qty:qty.toFixed(2);

        <input class="eq-input" id="eq-${sid}" type="text"
          value="${xe('='+(formula||String(qty)))}"

          readonly

function stockCellHtml(id){
  const qty=stockData[id]||0;
  const sid=id.replace(/[^a-zA-Z0-9_-]/g,'_');
  const formula=formulaData[id]||'';
  if(qty>0){
    const disp=qty%1===0?qty:qty.toFixed(2);
    return`<div class="stock-wrap">
      <span class="stock-qty" id="sqty-${sid}" onclick="openNp('${id}')">${disp}</span>
      <div class="eq-wrap">
        <input class="eq-input" id="eq-${sid}" type="text" value="${xe('='+(formula||String(qty)))}"
          oninput="onEqIn('${id}','${sid}')"
          onkeydown="onEqKd(event,'${id}','${sid}')"
          onclick="event.stopPropagation()"

        <button class="eq-ok" id="eqok-${sid}" onclick="confirmEq('${id}','${sid}')">✓</button>

  return`<div class="stock-empty-btn" onclick="openNp('${id}')">＋</div>`;

function buildColHeads(){
  const desktop=isDesktop();
  document.getElementById('colHeads').innerHTML=desktop
    ?`<div class="col-h">UID</div>
      <div class="col-h">Item Description</div>
      <div class="col-h">📦 Physical Stock</div>
      <div class="col-h">U/M</div>
      <div class="col-h">Pack</div>
      <div class="col-h">Supplier</div>

    :`<div class="col-h">Item Description</div>
      <div class="col-h">📦 Stock</div>`;

function getFiltered(){
  let items=ITEMS;
  if(searchQuery){
    const terms=searchQuery.split(/\s+/).filter(Boolean);
    items=items.filter(r=>{
      const t=(r.id+' '+r.desc+' '+r.pack+' '+r.sup+' '+r.cat+' '+r.brand+' '+r.origin).toLowerCase();
      return terms.every(w=>t.includes(w));
    });
  }
  return items;

// ── VIRTUAL SCROLL ────────────────────────────────────────────
let vsItems=[],vsRowH=0,vsStart=0,vsEnd=0;
const VS_BUF=5;

function vsRowHeight(){
  if(vsRowH>0)return vsRowH;
  vsRowH=isDesktop()?68:Math.round((window.innerHeight-132)/7);
  return vsRowH;
}

function rowHtml(r){
  const sid=r.id.replace(/[^a-zA-Z0-9_-]/g,'_');
  const desktop=isDesktop();
  if(desktop){
    const dDesc = cleanDesc(r.desc, r.id);
    return`<div class="item-row" id="row-${sid}">
      <div class="cell cell-uid">${xe(r.id)}</div>
      <div class="cell cell-desc">
        <div class="desc-name">${xe(dDesc)}</div>
        ${r.cat?`<div class="desc-meta"><span class="pill pill-cat">${xe(r.cat)}</span></div>`:''}
      </div>
      <div class="cell cell-stock">${stockCellHtml(r.id)}</div>
      <div class="cell cell-um">${xe(r.um)}</div>
      <div class="cell cell-pack-col">${xe(r.pack)}</div>
      <div class="cell cell-sup">${xe(r.sup)}</div>
      <div class="cell cell-brand-col">
        ${r.brand?`<span class="pill pill-brand">${xe(r.brand)}</span>`:''}
        ${r.origin?`<span class="pill pill-origin" style="margin-top:2px">${xe(r.origin)}</span>`:''}
      </div>
    </div>`;
  } else {
    const mDesc = cleanDesc(r.desc, r.id);
    return`<div class="item-row" id="row-${sid}" style="min-height:${vsRowH}px">
      <div class="cell">
        <div class="desc-name">${xe(mDesc)} <span style="color:var(--pack-clr);font-size:10px">(${xe(r.pack)})</span></div>
        <span class="mob-uid">${xe(r.id)}</span>
        <span class="mob-sup">(${xe(r.sup)})</span>
        <div class="desc-meta">
          ${r.brand?`<span class="pill pill-brand">${xe(r.brand)}</span>`:''}
          ${r.origin?`<span class="pill pill-origin">${xe(r.origin)}</span>`:''}
        </div>
      </div>
      <div class="cell cell-mob-right" id="cmr-${sid}">${stockCellHtmlMobile(r.id,r.um)}</div>
    </div>`;
  }
}

function vsRender(scrollTop){
  const tbody=document.getElementById('tbody');
  const wrap=document.getElementById('tblArea');
  const rh=vsRowHeight();
  const total=vsItems.length;
  if(!total){tbody.innerHTML='<div class="empty-state">No items found</div>';return;}
  const viewH=wrap.clientHeight;
  const start=Math.max(0,Math.floor(scrollTop/rh)-VS_BUF);
  const end=Math.min(total-1,Math.ceil((scrollTop+viewH)/rh)+VS_BUF);
  if(start===vsStart&&end===vsEnd)return;
  vsStart=start;vsEnd=end;
  const topPad=start*rh;
  const bottomPad=Math.max(0,(total-end-1)*rh);
  tbody.innerHTML=`<div style="height:${topPad}px"></div>`+vsItems.slice(start,end+1).map(rowHtml).join('')+`<div style="height:${bottomPad}px"></div>`;
}

function renderTable(){
  vsRowH=0;
  vsItems=getFiltered();
  vsStart=-1;vsEnd=-1;
  document.getElementById('barCount').textContent=vsItems.length.toLocaleString();
  const wrap=document.getElementById('tblArea');
  wrap.scrollTop=0;
  vsRender(0);
}

let vsTicking=false;
document.getElementById('tblArea').addEventListener('scroll',function(){
  if(!vsTicking){requestAnimationFrame(()=>{vsRender(this.scrollTop);vsTicking=false;});vsTicking=true;}
},{passive:true});

function updateRowDisplay(uid){
  const sid=uid.replace(/[^a-zA-Z0-9_-]/g,'_');
  const row=document.getElementById('row-'+sid);
  if(row){
    const qty=stockData[uid]||0;
    const formula=formulaData[uid]||'';
    const qtyEl=document.getElementById('sqty-'+sid);
    const eqEl=document.getElementById('eq-'+sid);
    if(qty>0&&qtyEl&&eqEl){
      qtyEl.textContent=qty%1===0?qty:qty.toFixed(2);
      if(document.activeElement!==eqEl){
        eqEl.value='='+(formula||String(qty));
        document.getElementById('eqok-'+sid)?.classList.remove('on');
      }
    } else {
      if(!isDesktop()){
        const cmr=document.getElementById('cmr-'+sid);
        const item=ITEMS.find(r=>r.id===uid);
        if(cmr)cmr.innerHTML=stockCellHtmlMobile(uid,item?.um||'');
      } else {
        const sc=row.querySelector('.cell-stock');
        if(sc)sc.innerHTML=stockCellHtml(uid);
      }
    }
    row.classList.remove('updated');void row.offsetWidth;row.classList.add('updated');
  }
}

window.addEventListener('resize',()=>{

// ── NUMPAD ────────────────────────────────────────────────────
let np={id:null,val:'0',op:'+'};
let npPos={x:window.innerWidth-190,y:70};
let npDrg=false,npOX=0,npOY=0;

function openNp(id){
  const item=ITEMS.find(r=>r.id===id);if(!item)return;
  np.id=id;np.val='0';np.op='+';
  const popup=document.getElementById('npPopup');
  npPos.x=Math.min(npPos.x,window.innerWidth-186);
  npPos.y=Math.max(10,Math.min(npPos.y,window.innerHeight-380));
  popup.style.left=npPos.x+'px';popup.style.top=npPos.y+'px';
  document.getElementById('npName').textContent=item.desc;
  const umEl=document.getElementById('npUm');
  umEl.textContent=item.um||'';umEl.style.display=item.um?'inline-block':'none';
  const ex=stockData[id]||0;
  document.getElementById('npExisting').innerHTML=ex>0?`Current: <span>${ex} ${item.um}</span>`:'No stock yet';
  document.querySelectorAll('.np-op-tab').forEach(t=>t.classList.remove('active'));
  document.querySelector('.np-op-tab[data-op="+"]').classList.add('active');
  npDraw();
  popup.classList.add('open');
  setTimeout(()=>document.addEventListener('pointerdown',npOutside),50);
}
function closeNp(){document.getElementById('npPopup').classList.remove('open');document.removeEventListener('pointerdown',npOutside);}
function npOutside(e){if(!document.getElementById('npPopup').contains(e.target)&&!e.target.closest('.stock-empty-btn')&&!e.target.closest('.stock-qty')&&!e.target.closest('.eq-input'))closeNp();}
function setOp(el){np.op=el.dataset.op;np.val='0';document.querySelectorAll('.np-op-tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');npDraw();}
function npKey(k){
  if(k==='back'){np.val=np.val.length>1?np.val.slice(0,-1):'0';}
  else if(k==='.'){if(!np.val.includes('.'))np.val+='.'; }
  else{np.val=np.val==='0'?k:np.val+k;}
  npDraw();
}
function npDraw(){
  const valEl=document.getElementById('npVal'),prevEl=document.getElementById('npPreview');
  const ex=stockData[np.id]||0,um=(ITEMS.find(r=>r.id===np.id)||{}).um||'';
  valEl.textContent=np.val;valEl.className='np-value'+(np.val!=='0'?' active':'');
  if(np.val==='0'){prevEl.textContent='';return;}
  try{
    const ent=parseFloat(Function('return ('+np.val+')')());if(isNaN(ent)){prevEl.textContent='';return;}
    let nt;
    if(np.op==='=')nt=ent;else if(np.op==='+')nt=ex+ent;else if(np.op==='-')nt=ex-ent;
    else if(np.op==='*')nt=ex*ent;else if(np.op==='/')nt=ent!==0?ex/ent:ex;
    nt=Math.max(0,parseFloat(nt.toFixed(4)));
    const diff=parseFloat((nt-ex).toFixed(4));
    prevEl.textContent=ex+' '+(diff>=0?'+':'')+diff+' = '+nt+' '+um;
  }catch(e){prevEl.textContent='';}
}
function npConfirm(){
  const ex=stockData[np.id]||0;if(np.val==='0'){closeNp();return;}
  let nt,ent;
  try{
    ent=parseFloat(Function('return ('+np.val+')')());
    if(np.op==='=')nt=ent;else if(np.op==='+')nt=ex+ent;else if(np.op==='-')nt=ex-ent;
    else if(np.op==='*')nt=ex*ent;else if(np.op==='/')nt=ent!==0?ex/ent:ex;
    nt=Math.max(0,parseFloat(nt.toFixed(4)));
  }catch(e){closeNp();return;}
  if(navigator.vibrate)navigator.vibrate(35);
  const diff=parseFloat((nt-ex).toFixed(4));
  if(np.op==='=')sendSet(np.id,nt);else if(diff!==0)sendAdd(np.id,diff);
  const item=ITEMS.find(r=>r.id===np.id);
  document.getElementById('npExisting').innerHTML=`Current: <span>${nt} ${item?.um||''}</span>`;
  np.val='0';npDraw();
}
document.addEventListener('keydown',e=>{
  if(!document.getElementById('npPopup').classList.contains('open'))return;
  if(e.key==='Enter'){e.preventDefault();npConfirm();}
  if(e.key==='Escape')closeNp();
});

document.getElementById('npDrag').addEventListener('mousedown',dS);
document.getElementById('npDrag').addEventListener('touchstart',dS,{passive:true});
function dS(e){npDrg=true;const r=document.getElementById('npPopup').getBoundingClientRect();const cx=e.touches?e.touches[0].clientX:e.clientX,cy=e.touches?e.touches[0].clientY:e.clientY;npOX=cx-r.left;npOY=cy-r.top;document.addEventListener('mousemove',dM);document.addEventListener('mouseup',dE);document.addEventListener('touchmove',dM,{passive:true});document.addEventListener('touchend',dE);}
function dM(e){if(!npDrg)return;const cx=e.touches?e.touches[0].clientX:e.clientX,cy=e.touches?e.touches[0].clientY:e.clientY;const p=document.getElementById('npPopup');const nx=Math.max(0,Math.min(window.innerWidth-p.offsetWidth,cx-npOX)),ny=Math.max(0,Math.min(window.innerHeight-p.offsetHeight,cy-npOY));npPos.x=nx;npPos.y=ny;p.style.left=nx+'px';p.style.top=ny+'px';}
function dE(){npDrg=false;document.removeEventListener('mousemove',dM);document.removeEventListener('mouseup',dE);document.removeEventListener('touchmove',dM);document.removeEventListener('touchend',dE);}

// ══════════════════════════════════════════════════════════════
// ── CUSTOM MOBILE QWERTY SEARCH KEYBOARD — GLOBAL SCOPE ──────
// ══════════════════════════════════════════════════════════════
let qkbQuery = '';
let qkbCursorPos = 0;       // cursor index within qkbQuery

// ── iOS-style trackpad state ──
let qkbTrackpad = false;    // are we in trackpad drag mode?
let qkbTrackX = 0;          // last touch X when trackpad started
let qkbTrackCursorStart = 0;// cursor pos when trackpad drag began
const QKB_TRACK_SENSITIVITY = 10; // px per character step

function qkbOpen() {
  if (isDesktop()) return;
  document.activeElement?.blur();
  qkbQuery = searchQuery;
  qkbCursorPos = qkbQuery.length;
  qkbRefresh();
  document.getElementById('qkb').classList.add('open');
  // Shrink table to eliminate black gap
  requestAnimationFrame(() => {
    const kbh = document.getElementById('qkb').offsetHeight;
    document.getElementById('tblArea').style.height = (window.innerHeight - 50 - kbh) + 'px';
  });
}
function qkbDone() {
  document.getElementById('qkb').classList.remove('open');
  document.getElementById('tblArea').style.height = '';
  qkbTrackpad = false;
}
function qkbClear() {
  qkbQuery = '';
  qkbCursorPos = 0;
  qkbRefresh();
  searchQuery = '';
  renderTable();
}
function qkbKey(k) {
  if (k === 'back') {
    if (qkbCursorPos > 0) {
      qkbQuery = qkbQuery.slice(0, qkbCursorPos - 1) + qkbQuery.slice(qkbCursorPos);
      qkbCursorPos--;
    }
  } else if (k === ' ') {
    // regular tap on space = insert space at cursor
    qkbQuery = qkbQuery.slice(0, qkbCursorPos) + ' ' + qkbQuery.slice(qkbCursorPos);
    qkbCursorPos++;
  } else {
    qkbQuery = qkbQuery.slice(0, qkbCursorPos) + k + qkbQuery.slice(qkbCursorPos);
    qkbCursorPos++;
  }
  qkbRefresh();
}

function qkbRefresh() {
  const disp = document.getElementById('qkbDisplay');
  const inp  = document.getElementById('searchIn');
  if (qkbQuery) {
    // Show text with blinking | cursor at the right position
    const before = qkbQuery.slice(0, qkbCursorPos);
    const after  = qkbQuery.slice(qkbCursorPos);
    // Use a <span> for cursor so CSS animation works without ::after conflict
    disp.innerHTML = '<span class="qkb-text-before"></span><span class="qkb-cursor"></span><span class="qkb-text-after"></span>';
    disp.querySelector('.qkb-text-before').textContent = before;
    disp.querySelector('.qkb-text-after').textContent  = after;
    disp.classList.remove('empty');
    inp.value = qkbQuery;
  } else {
    disp.textContent = 'Search…';
    disp.classList.add('empty');
    inp.value = '';
  }
  searchQuery = qkbQuery.toLowerCase().trim();
  clearTimeout(sT);
  sT = setTimeout(() => renderTable(), 80);
}

// ── SPACE KEY: tap = space, hold+drag = iOS trackpad ──────────
(function() {
  let holdTimer = null;

  function spaceEl() { return document.querySelector('.qkb-key-space'); }

  function onSpaceTouchStart(e) {
    qkbTrackpad = false;
    qkbTrackX = e.touches[0].clientX;
    qkbTrackCursorStart = qkbCursorPos;
    holdTimer = setTimeout(() => {
      qkbTrackpad = true;
      if (navigator.vibrate) navigator.vibrate(30);
      // visual cue
      spaceEl().style.background = 'rgba(16,185,129,.35)';
    }, 300);
  }

  function onSpaceTouchMove(e) {
    if (!qkbTrackpad) return;
    e.preventDefault();
    const dx = e.touches[0].clientX - qkbTrackX;
    const steps = Math.round(dx / QKB_TRACK_SENSITIVITY);
    qkbCursorPos = Math.max(0, Math.min(qkbQuery.length, qkbTrackCursorStart + steps));
    qkbRefresh();
  }

  function onSpaceTouchEnd(e) {
    clearTimeout(holdTimer);
    if (qkbTrackpad) {
      // just finished dragging — don't insert space
      qkbTrackpad = false;
      spaceEl().style.background = '';
    } else {
      // short tap — insert space normally
      qkbKey(' ');
    }
  }

  // Attach after DOM ready
  document.addEventListener('DOMContentLoaded', () => {}, false);
  // We attach via event delegation since the element exists at parse time
  document.addEventListener('touchstart', e => {
    if (e.target.closest('.qkb-key-space')) onSpaceTouchStart(e);
  }, { passive: true });
  document.addEventListener('touchmove', e => {
    if (qkbTrackpad) { onSpaceTouchMove(e); }
  }, { passive: false });
  document.addEventListener('touchend', e => {
    if (e.target.closest('.qkb-key-space') || qkbTrackpad) onSpaceTouchEnd(e);
  }, { passive: true });
})();

// ══════════════════════════════════════════════════════════════
// ── CUSTOM MOBILE FORMULA KEYBOARD — GLOBAL SCOPE ────────────
// ══════════════════════════════════════════════════════════════
let fkbTargetId = null, fkbTargetSid = null, fkbVal = '';

function fkbOpen(id, sid) {
  if (isDesktop()) return;
  fkbTargetId = id; fkbTargetSid = sid;
  const existing = formulaData[id] || String(stockData[id] || 0);
  fkbVal = existing;
  document.getElementById('fkbDisplay').textContent = '=' + fkbVal;
  document.getElementById('fkbOverlay').classList.add('open');
  document.activeElement?.blur();
}
function fkbCancel() {
  document.getElementById('fkbOverlay').classList.remove('open');
  fkbTargetId = null; fkbTargetSid = null; fkbVal = '';
}
function fkbKey(k) {
  if (k === 'back') {
    fkbVal = fkbVal.length > 0 ? fkbVal.slice(0, -1) : '';
  } else if (k === '()') {
    const opens = (fkbVal.match(/\(/g) || []).length;
    const closes = (fkbVal.match(/\)/g) || []).length;
    fkbVal += opens > closes ? ')' : '(';
  } else {
    fkbVal += k;
  }
  document.getElementById('fkbDisplay').textContent = '=' + fkbVal;
}
function fkbConfirm() {
  if (!fkbTargetId) return;
  const id = fkbTargetId, sid = fkbTargetSid;
  const clean = fkbVal.replace(/[^0-9.+\-*\/()]/g, '');
  if (!clean) { fkbCancel(); return; }
  let qty;
  try { qty = Math.max(0, parseFloat(Function('return (' + clean + ')')().toFixed(4))); }
  catch (e) { qty = stockData[id] || 0; }
  const inp = document.getElementById('eq-' + sid);
  if (inp) inp.value = '=' + clean;
  document.getElementById('eqok-' + sid)?.classList.remove('on');
  fkbCancel();
  sendSetFormula(id, clean, qty);
}

// SIMPLE LOGIN — USERNAME + PASSWORD
// ══════════════════════════════════════════════
const USERS = {
  'steve':   { password: '1964', name: 'Steve',   color: '#10b981' },
  'aswanth': { password: '2026', name: 'Aswanth', color: '#818cf8' },
  'fatima':  { password: '2026', name: 'Fatima',  color: '#f472b6' },
};

let currentUser = null;

function showLoginScreen() {
  document.getElementById('loginScreen').classList.remove('hidden');
}
function hideLoginScreen() {
  document.getElementById('loginScreen').classList.add('hidden');
}

function doLogin() {
  const username = document.getElementById('loginUser').value.trim().toLowerCase();
  const password = document.getElementById('loginPassword').value;
  const errEl = document.getElementById('loginErr');

  if (!username || !password) { errEl.textContent = 'Please enter username and password'; return; }

  const user = USERS[username];
  if (!user || user.password !== password) {
    errEl.textContent = '✕ Wrong username or password';
    document.getElementById('loginPassword').value = '';
    return;
  }

  currentUser = { id: username, ...user };
  localStorage.setItem('c2c_user', username);
  updateNavUser();
  hideLoginScreen();
  if (navigator.vibrate) navigator.vibrate(35);
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !document.getElementById('loginScreen').classList.contains('hidden')) doLogin();
});

function updateNavUser() {
  const el = document.getElementById('navUser');
  if (currentUser) { el.textContent = '👤 ' + currentUser.name.toUpperCase(); el.style.color = currentUser.color; }
}

function lockApp() {
  if (!confirm('Sign out ' + (currentUser?.name || '') + '?')) return;
  localStorage.removeItem('c2c_user');
  currentUser = null;
  document.getElementById('navUser').textContent = '👤 —';
  document.getElementById('loginUser').value = '';
  document.getElementById('loginPassword').value = '';
  document.getElementById('loginErr').textContent = '';
  showLoginScreen();
}

// ── BOOT ──────────────────────────────────────────────────────
window.addEventListener('load', () => {
  if (localStorage.getItem('c2c_mode') === 'light') { document.body.classList.add('light'); document.getElementById('modeBtn').textContent = '☀️ LIGHT'; }
  loadLocal(); loadHistory();

  const savedUser = localStorage.getItem('c2c_user');
  if (savedUser && USERS[savedUser]) {
    currentUser = { id: savedUser, ...USERS[savedUser] };
    updateNavUser();
    hideLoginScreen();
  } else {
    showLoginScreen();
  }

  let p = 0, attempt = 0;
  const bar = document.getElementById('loadBar'), txt = document.getElementById('loadTxt');
  const iv = setInterval(() => { p = Math.min(p + Math.random() * 12, 88); bar.style.width = p + '%'; }, 60);

  function finishLoad() {  function finishLoad() {
    clearInterval(iv); bar.style.width = '100%';
    txt.textContent = ITEMS.length.toLocaleString() + ' items loaded ✓';
    document.getElementById('barCount').textContent = ITEMS.length.toLocaleString();
    setSync('ok', '● LIVE');
    setTimeout(() => { buildColHeads(); renderTable(); document.getElementById('loadScreen').style.display = 'none'; startFirebaseListener(); }, 200);
  }

  function fetchFromSheet() {
    attempt++;
    txt.textContent = attempt > 1 ? 'Retrying (' + attempt + '/3)…' : 'Connecting to sheet…';
    fetch(SHEETS_URL + '?action=getAll&_t=' + Date.now() + Math.random(), { cache: 'no-store', redirect: 'follow' })
      .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
      .then(d => {
        if (!d.ok || !d.items) throw new Error(d.error || 'No data');
        ITEMS = d.items;
        ITEMS.forEach(item => { stockData[item.id] = parseFloat(item.stock) || 0; if (item.formula) formulaData[item.id] = item.formula; });
        try { localStorage.setItem('c2c_items', JSON.stringify(ITEMS)); localStorage.setItem('c2c_items_ts', String(Date.now())); } catch (e) {}
        db.ref('stock').once('value').then(snap => {
          const fb = snap.val();
          if (fb) Object.entries(fb).forEach(([k, v]) => {
            const item = ITEMS.find(r => r.id.replace(/[.#$[\]]/g, '_') === k);
            if (!item) return;
            stockData[item.id] = parseFloat(v.qty) || 0;
            formulaData[item.id] = String(v.formula || v.qty || 0);
          });
          saveLocal(); finishLoad();
        }).catch(() => finishLoad());
      })
      .catch(() => {
        if (attempt < 3) { txt.textContent = 'Retrying…'; setTimeout(fetchFromSheet, 2000); }
        else { clearInterval(iv); bar.style.width = '100%'; txt.textContent = '✕ Failed — tap to retry'; txt.style.cursor = 'pointer'; txt.onclick = () => { attempt = 0; p = 0; bar.style.width = '0%'; txt.style.cursor = ''; fetchFromSheet(); }; setSync('error', '✕ ERROR'); }
      });
  }

  const CACHE_KEY = 'c2c_items', CACHE_TS = 'c2c_items_ts', CACHE_TTL = 6 * 60 * 60 * 1000;
  const cachedTs = parseInt(localStorage.getItem(CACHE_TS) || '0');
  const cacheValid = (Date.now() - cachedTs) < CACHE_TTL;
  const cachedItems = localStorage.getItem(CACHE_KEY);

  if (cachedItems && cacheValid) {
    try {
      ITEMS = JSON.parse(cachedItems);
      if (ITEMS && ITEMS.length > 10) {
        txt.textContent = 'Loaded from cache ⚡';
        db.ref('stock').once('value').then(snap => {
          const fb = snap.val();
          if (fb) Object.entries(fb).forEach(([k, v]) => {
            const item = ITEMS.find(r => r.id.replace(/[.#$[\]]/g, '_') === k);
            if (!item) return;
            stockData[item.id] = parseFloat(v.qty) || 0;
            formulaData[item.id] = String(v.formula || v.qty || 0);
          });
          saveLocal(); finishLoad();
        }).catch(() => finishLoad());
        return;
      }
    } catch (e) { ITEMS = []; }
  }
  fetchFromSheet();
});
